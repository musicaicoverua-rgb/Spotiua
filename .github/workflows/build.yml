name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Використовуємо стабільну версію, яка ідеально сумісна з кодом Kimi
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: STEP 1 - Unpack Kimi's Project
      run: |
        unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
        FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
        echo "Знайдено проект Flutter у папці: $FLUTTER_DIR"
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: STEP 2 - Hardcode Dependency Fixes
      run: |
        cd ${{ env.FLUTTER_DIR }}
        echo "Оновлюємо конфліктні залежності..."
        
        sed -i 's/intl:.*/intl: ^0.19.0/g' pubspec.yaml
        sed -i 's/package_info_plus:.*/package_info_plus: any/g' pubspec.yaml
        sed -i 's/device_info_plus:.*/device_info_plus: any/g' pubspec.yaml
        sed -i 's/connectivity_plus:.*/connectivity_plus: any/g' pubspec.yaml
        sed -i 's/share_plus:.*/share_plus: any/g' pubspec.yaml
        sed -i 's/supabase_flutter:.*/supabase_flutter: any/g' pubspec.yaml

    - name: STEP 3 - Fix Kimi's Native Android Wrapper
      run: |
        cd ${{ env.FLUTTER_DIR }}
        mkdir -p android
        
        echo "1. Лікуємо помилку 'Your app isn't using AndroidX'..."
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
        
        echo "2. Лікуємо помилку 'Could not get unknown property kotlin_version' ГЛОБАЛЬНО..."
        echo "kotlin_version=1.9.0" >> android/gradle.properties
        
        echo "3. Додаємо страхові версії SDK для старих плагінів..."
        echo "flutter.compileSdkVersion=34" >> android/local.properties
        echo "flutter.minSdkVersion=24" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties

    - name: STEP 4 - Pub Get & Generate Code
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter pub get
        dart run build_runner build --delete-conflicting-outputs || true

    - name: STEP 5 - Build Production APK
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter build apk --debug

    - name: STEP 6 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-App-Ready
        path: "**/build/app/outputs/flutter-apk/*.apk"
