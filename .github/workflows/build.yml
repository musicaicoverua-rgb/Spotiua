name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Pre-Build Sterilization (Fix everything BEFORE Gradle runs)
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Фікс налаштувань Gradle
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 3. ФІКС ЛОКАЛЬНОЇ ПОМИЛКИ KIMI 
        # Видаляємо зламані рядки з вихідного коду ДО того, як Gradle їх побачить
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/username_optional/d' {} +
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/{str}/d' {} +
        
        # 4. ФІКС БАГУ GOOGLE (Оновлюємо Media3 до чистої версії 1.3.1)
        # Додаємо суворе правило прямо у файл налаштувань ДОДАТКА
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        configurations.all {
            resolutionStrategy {
                force("androidx.media3:media3-common:1.3.1")
                force("androidx.media3:media3-session:1.3.1")
                force("androidx.media3:media3-exoplayer:1.3.1")
                force("androidx.media3:media3-ui:1.3.1")
            }
        }
        EOF

    - name: Build Native Android App
      run: |
        cd openwave/android
        # Запускаємо збірку ОДИН РАЗ на ідеально чистому коді та правильних бібліотеках
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
