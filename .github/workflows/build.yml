name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Correct Gradle Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare and Patch Android Project
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Виправлення дублікатів репозиторіїв та мов
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 3. ВИПРАВЛЕННЯ БАГУ GOOGLE (Оновлюємо бібліотеку media3 до 1.3.1)
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        configurations.all {
            resolutionStrategy.eachDependency {
                if (requested.group == "androidx.media3") {
                    useVersion("1.3.1")
                }
            }
        }
        EOF
        
        # 4. ВИПРАВЛЕННЯ БАГУ KIMI (Видаляємо рядки з помилками у локальних файлах)
        python3 - <<'EOF'
        import os
        for root, dirs, files in os.walk('openwave/android/app/src/main/res'):
            for f in files:
                if f.endswith('.xml'):
                    path = os.path.join(root, f)
                    try:
                        with open(path, 'r', encoding='utf-8') as file:
                            lines = file.readlines()
                        # Записуємо назад тільки ті рядки, де немає зламаного символу \u або {str}
                        with open(path, 'w', encoding='utf-8') as file:
                            for line in lines:
                                if r'\u' in line or '{str}' in line:
                                    continue
                                file.write(line)
                    except Exception as e:
                        pass
        EOF

    - name: Build Native Android App
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
