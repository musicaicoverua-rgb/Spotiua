name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: STEP 1 - Project Sterilization
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        # Fix repositories and basic gradle settings
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        if ! grep -q "kotlin-parcelize" openwave/android/app/build.gradle.kts; then
          sed -i '/id("com.android.application")/a \    id("kotlin-parcelize")' openwave/android/app/build.gradle.kts
        fi
        # Add necessary media and logging dependencies
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        dependencies {
            implementation("androidx.media3:media3-exoplayer:1.3.1")
            implementation("androidx.media3:media3-session:1.3.1")
            implementation("androidx.media3:media3-common:1.3.1")
            implementation("androidx.media3:media3-ui:1.3.1")
            implementation("androidx.media:media:1.7.0")
            implementation("com.jakewharton.timber:timber:5.0.1")
        }
        EOF

    - name: STEP 2 - UI & Resource Generator
      run: |
        RES_DIR="openwave/android/app/src/main/res"
        mkdir -p "$RES_DIR/xml" "$RES_DIR/values" "$RES_DIR/mipmap-anydpi-v26" "$RES_DIR/drawable"
        echo '<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup><exclude domain="sharedpref" path="."/></cloud-backup></data-extraction-rules>' > "$RES_DIR/xml/data_extraction_rules.xml"
        echo '<?xml version="1.0" encoding="utf-8"?><full-backup-content><exclude domain="sharedpref" path="."/></full-backup-content>' > "$RES_DIR/xml/backup_rules.xml"
        # Strings and themes
        cat << 'EOF' > "$RES_DIR/values/kimi_fix_resources.xml"
        <resources>
            <string name="app_name">OpenWave</string>
            <string name="playback_channel_name">Music Playback</string>
            <string name="download_channel_name">Downloads</string>
            <string name="downloading_track">Downloading...</string>
            <string name="download_complete">Complete</string>
            <string name="download_failed">Failed</string>
            <style name="Theme.OpenWave" parent="android:Theme.DeviceDefault.NoActionBar"/>
        </resources>
        EOF
        # Vectors
        V_XML='<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FFFFFF" android:pathData="M8,5v14l11,-7z"/></vector>'
        for i in play pause previous next ic_download ic_notification ic_launcher; do
            echo "$V_XML" > "$RES_DIR/drawable/${i}.xml"
        done

    - name: STEP 3 - Core Architecture Restorer
      run: |
        python3 - <<'EOF'
        import os, re
        src_dir = 'openwave/android/app/src/main/java'
        base_pkg = "com.openwave.app"
        
        # Determine package from AppDatabase
        for r, d, f in os.walk(src_dir):
            if 'AppDatabase.kt' in f:
                with open(os.path.join(r, 'AppDatabase.kt'), 'r') as db_f:
                    for line in db_f:
                        if line.startswith('package'):
                            pkg_str = line.replace('package ', '').strip()
                            base_pkg = pkg_str.split('.data')[0] if '.data' in pkg_str else pkg_str.split('.domain')[0]
                            break

        def write_file(path_parts, content):
            full_path = os.path.join(src_dir, base_pkg.replace('.', '/'), *path_parts)
            os.makedirs(os.path.dirname(full_path), exist_ok=True)
            with open(full_path, 'w') as f:
                f.write(content.replace("BASE_PKG", base_pkg))

        # domain/model/Track.kt
        write_file(['domain', 'model', 'Track.kt'], """package BASE_PKG.domain.model
        import android.os.Parcelable
        import kotlinx.parcelize.Parcelize
        @Parcelize
        data class Track(val id: String="", val title: String="", val artist: String="", val coverUrl: String="", val streamUrl: String="", val duration: Long=0L) : Parcelable
        """)

        # data/local/OfflineDownload.kt
        write_file(['data', 'local', 'OfflineDownload.kt'], """package BASE_PKG.data.local
        import androidx.room.*
        import android.os.Parcelable
        import kotlinx.parcelize.Parcelize
        @Parcelize @Entity(tableName="offline_downloads")
        data class OfflineDownload(@PrimaryKey val id: String, val trackId: String, val filePath: String, val isComplete: Boolean, val progress: Int) : Parcelable
        """)

        # data/local/OfflineDownloadDao.kt
        write_file(['data', 'local', 'OfflineDownloadDao.kt'], """package BASE_PKG.data.local
        import androidx.room.*
        import kotlinx.coroutines.flow.Flow
        @Dao
        interface OfflineDownloadDao {
            @Query("SELECT * FROM offline_downloads")
            fun getAllDownloads(): Flow<List<OfflineDownload>>
            @Insert(onConflict = OnConflictStrategy.REPLACE)
            suspend fun insertDownload(download: OfflineDownload)
            @Query("DELETE FROM offline_downloads WHERE trackId = :id")
            suspend fun deleteDownload(id: String)
        }
        """)

        # service/DownloadService.kt
        write_file(['service', 'DownloadService.kt'], """package BASE_PKG.service
        import android.app.Service
        import android.content.Intent
        import android.os.IBinder
        import androidx.core.app.NotificationCompat
        import BASE_PKG.R
        class DownloadService : Service() {
            override fun onBind(intent: Intent?): IBinder? = null
            override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                startForeground(1, NotificationCompat.Builder(this, "dl").setSmallIcon(R.drawable.ic_notification).build())
                return START_STICKY
            }
        }
        """)
        EOF

    - name: STEP 4 - AppDatabase Stabilizer (Brace Safe)
      run: |
        python3 - <<'EOF'
        import os, re
        src = 'openwave/android/app/src/main/java'
        db_file = next((os.path.join(r, 'AppDatabase.kt') for r, d, f in os.walk(src) if 'AppDatabase.kt' in f), None)
        
        if db_file:
            with open(db_file, 'r') as f: content = f.read()
            pkg = re.search(r'^package\s+(.*)', content, re.M).group(1).strip()
            
            # Clean AppDatabase of bad names
            content = content.replace('OfflineDownloadEntity', 'OfflineDownload')
            
            # Find all classes that Room expects
            entities = re.findall(r'(\w+)::class', content)
            daos = re.findall(r'abstract\s+fun\s+\w+\s*\(\s*\)\s*:\s*(\w+)', content)
            
            existing = set()
            for r, d, files in os.walk(src):
                for f in files: existing.add(f.replace('.kt', ''))
            
            # Create stubs for anything missing
            for name in entities:
                if name not in existing:
                    with open(os.path.join(os.path.dirname(db_file), name + ".kt"), 'w') as out:
                        out.write("package " + pkg + "\nimport androidx.room.*\n@Entity\ndata class " + name + "(@PrimaryKey val id: String = \"\")\n")
            
            for name in daos:
                if name not in existing:
                    with open(os.path.join(os.path.dirname(db_file), name + ".kt"), 'w') as out:
                        out.write("package " + pkg + "\nimport androidx.room.*\n@Dao\ninterface " + name + " {}\n")
            
            with open(db_file, 'w') as f: f.write(content)
        EOF

    - name: STEP 5 - Final Build
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: STEP 6 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-Final-Build
        path: '**/*.apk'
