name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Для нативних Android додатків зазвичай краще використовувати Java 17
        distribution: 'temurin'

    - name: Build Native Android App
      run: |
        # 1. Розпаковуємо ваш новий архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Переходимо в папку Android, яку створив Kimi
        cd openwave/android
        
        # 3. Даємо права на виконання інструменту збірки Gradle
        chmod +x gradlew
        
        # 4. Запускаємо стандартну збірку Android-додатка
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-App
        path: '**/*.apk'
