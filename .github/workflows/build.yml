name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # THE GOLDEN FIX: Downgrading to stable 3.19.6
    # This version perfectly bridges Kimi's older Gradle plugins 
    # with the newer Dart 3.3 SDK requirements.
    - name: Install Flutter (Stable 3.19.6)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'

    - name: STEP 1 - Unpack Project
      run: |
        unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
        FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
        echo "Found Flutter project in directory: $FLUTTER_DIR"
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: STEP 2 - Fix Kimi's Native Android Config
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        mkdir -p android
        
        echo "1. Fixing Kotlin version globally..."
        echo "kotlin_version=1.9.0" >> android/gradle.properties
        
        echo "2. Enabling AndroidX..."
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
        
        echo "3. Injecting SDK versions for legacy plugins..."
        echo "flutter.compileSdkVersion=34" >> android/local.properties
        echo "flutter.minSdkVersion=24" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties

    - name: STEP 3 - Resolve Dependencies & Generate Code
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        echo "Setting flexible versions for minor conflicts..."
        sed -i 's/intl:.*/intl: any/g' pubspec.yaml
        sed -i 's/package_info_plus:.*/package_info_plus: any/g' pubspec.yaml
        
        echo "Downloading packages..."
        flutter pub get
        
        echo "Running code generator for database..."
        dart run build_runner build --delete-conflicting-outputs || true

    - name: STEP 4 - Build Production APK
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter build apk --debug

    - name: STEP 5 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-App-Ready
        path: "**/build/app/outputs/flutter-apk/*.apk"
