name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Correct Gradle Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare and Patch Android Project
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Виправлення дублікатів репозиторіїв та мов
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 3. СУПЕР-ПАТЧ 2.0 (Через Perl): Агресивна зачистка всіх зламаних \u{str}
        # Крок А: Замінюємо конкретно \u{str} на %s
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec perl -pi -e 's/\\u\{str\}/%s/g' {} +
        # Крок Б: Видаляємо будь-які \u, після яких немає 4-х цифр (щоб компілятор не падав)
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec perl -pi -e 's/\\u(?![0-9a-fA-F]{4})//g' {} +
        # Крок В: Замінюємо залишки {str} на %s
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec perl -pi -e 's/\{str\}/%s/g' {} +

    - name: Build Native Android App
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
