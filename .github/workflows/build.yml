name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Correct Gradle Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare and Patch Android Project
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Виправлення дублікатів репозиторіїв
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        
        # 3. Видаляємо зламаний рядок оптимізації мов
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 4. СУПЕР-ПАТЧ: Очищаємо всі файли перекладів від помилок Kimi
        python3 - <<'EOF'
        import os, re
        for root, dirs, files in os.walk('openwave/android/app/src/main/res'):
            if 'strings.xml' in files:
                path = os.path.join(root, 'strings.xml')
                with open(path, 'r', encoding='utf-8') as f:
                    content = f.read()
                
                # Замінюємо зламані вставки на правильний плейсхолдер %s
                content = content.replace(r'\u{str}', '%s')
                content = content.replace(r'\{str}', '%s')
                content = content.replace(r'{str}', '%s')
                
                # Видаляємо будь-які \u, після яких немає 4-х цифр (щоб компілятор не падав)
                content = re.sub(r'\\u(?![0-9a-fA-F]{4})', '', content)
                
                with open(path, 'w', encoding='utf-8') as f:
                    f.write(content)
        EOF

    - name: Build Native Android App
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
