name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Correct Gradle Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare and Patch
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Виправляємо репозиторії та мови
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 3. ВИПРАВЛЯЄМО ЛОКАЛЬНІ ПОМИЛКИ KIMI (Це спрацювало минулого разу!)
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/username_optional/d' {} + || true
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/{str}/d' {} + || true
        
        # 4. СУВОРИЙ НАКАЗ GRADLE: Блокуємо зламану версію Google 1.2.0
        # Додаємо глобальну стратегію вирішення залежностей у корінь проекту
        cat << 'EOF' >> openwave/android/build.gradle.kts
        
        allprojects {
            configurations.all {
                resolutionStrategy {
                    force("androidx.media3:media3-common:1.1.1")
                    force("androidx.media3:media3-exoplayer:1.1.1")
                    force("androidx.media3:media3-session:1.1.1")
                    force("androidx.media3:media3-ui:1.1.1")
                }
            }
        }
        EOF

    - name: Build APK
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
