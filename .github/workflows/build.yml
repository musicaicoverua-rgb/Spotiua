name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Correct Gradle Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare and Destroy Bugs
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 1. Фікс системних налаштувань Gradle
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 2. Фікс бага Kimi (Ми вже бачили, що це працює і видаляє username_optional)
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/{str}/d' {} + || true
        
        # 3. ФІКС БАГА GOOGLE (Оновлюємо Media3 до чистої версії 1.3.1)
        # Якщо Kimi використав сучасний каталог версій (TOML), оновлюємо версію там:
        find openwave/android -name "*.toml" -type f -exec sed -i 's/"1.2.0"/"1.3.1"/g' {} + || true
        
        # Ставимо жорсткий блок в кінці головного файлу додатку. 
        # Це наказує Gradle ігнорувати все і качати тільки виправлену версію 1.3.1
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        configurations.all {
            resolutionStrategy {
                force("androidx.media3:media3-common:1.3.1")
                force("androidx.media3:media3-session:1.3.1")
                force("androidx.media3:media3-exoplayer:1.3.1")
                force("androidx.media3:media3-ui:1.3.1")
            }
        }
        EOF

    - name: Final Build
      run: |
        cd openwave/android
        # Тепер Gradle скачає правильну бібліотеку, де український переклад не зламано!
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
