name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Prepare and Patch Android Project
      run: |
        # Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # Виправлення помилки дублікатів репозиторіїв
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts

    - name: Build Native Android App
      run: |
        cd openwave/android
        
        # ВИПРАВЛЕННЯ ВЕРСІЇ GRADLE:
        # Створюємо локальний Gradle версії 8.4 замість несумісного 9.3.1
        gradle wrapper --gradle-version 8.4
        
        # Запускаємо збірку через сумісну версію
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
