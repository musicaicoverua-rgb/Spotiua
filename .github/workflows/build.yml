name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Inject Gradle Sterilization Hook
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # МАГІЯ ТУТ: Впроваджуємо хук прямо в конфігурацію додатка
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        tasks.matching { it.name.startsWith("merge") && it.name.endsWith("Resources") }.configureEach {
            doFirst {
                println("=== ЗАПУСК СТЕРИЛІЗАЦІЇ РЕСУРСІВ ПЕРЕД ЗЛИТТЯМ ===")
                // Створюємо проблемний рядок безпечним шляхом, щоб сам компілятор не впав
                val uStr = 92.toChar() + "u{str}"
                val regArtist = Regex("<string name=\"artist_name\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                val regUser = Regex("<string name=\"username_optional\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                
                fun sanitizeDir(dir: File) {
                    if (dir.exists()) {
                        dir.walkTopDown().filter { it.name.endsWith(".xml") }.forEach { file ->
                            try {
                                var text = file.readText()
                                var changed = false
                                
                                if (text.contains("artist_name")) {
                                    text = text.replace(regArtist, "")
                                    changed = true
                                }
                                if (text.contains("username_optional")) {
                                    text = text.replace(regUser, "")
                                    changed = true
                                }
                                if (text.contains(uStr)) {
                                    text = text.replace(uStr, "str")
                                    changed = true
                                }
                                
                                if (changed) {
                                    file.writeText(text)
                                    println("Вилікувано файл: " + file.absolutePath)
                                }
                            } catch(e: Exception) {}
                        }
                    }
                }
                
                // Проходимося катком і по кешу сервера, і по локальних файлах
                sanitizeDir(File(System.getProperty("user.home"), ".gradle/caches/transforms-3"))
                sanitizeDir(File(projectDir, "src/main/res"))
            }
        }
        EOF

    - name: Build APK (Single Clean Run)
      run: |
        cd openwave/android
        # Цей єдиний запуск пройде ідеально
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
