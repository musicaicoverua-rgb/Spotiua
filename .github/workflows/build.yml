name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Inject Gradle Hook, Dependencies and Plugins
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 1. Standardize Repository settings
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 2. Add Kotlin-Parcelize for data transfer support
        if ! grep -q "kotlin-parcelize" openwave/android/app/build.gradle.kts; then
          sed -i '/id("com.android.application")/a \    id("kotlin-parcelize")' openwave/android/app/build.gradle.kts
        fi
        
        # 3. Force healthy library versions and inject Resource Scrubbing Hook
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        dependencies {
            implementation("androidx.media3:media3-exoplayer:1.3.1")
            implementation("androidx.media3:media3-session:1.3.1")
            implementation("androidx.media3:media3-common:1.3.1")
            implementation("androidx.media3:media3-ui:1.3.1")
            implementation("androidx.media:media:1.7.0")
            implementation("com.jakewharton.timber:timber:5.0.1")
        }
        
        tasks.matching { it.name.startsWith("merge") && it.name.endsWith("Resources") }.configureEach {
            doFirst {
                val uStr = 92.toChar() + "u{str}"
                val regArtist = Regex("<string name=\"artist_name\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                val regUser = Regex("<string name=\"username_optional\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                
                fun sanitizeDir(dir: File) {
                    if (dir.exists()) {
                        dir.walkTopDown().filter { it.name.endsWith(".xml") }.forEach { file ->
                            try {
                                var text = file.readText()
                                var changed = false
                                if (text.contains("artist_name")) { text = text.replace(regArtist, ""); changed = true }
                                if (text.contains("username_optional")) { text = text.replace(regUser, ""); changed = true }
                                if (text.contains(uStr)) { text = text.replace(uStr, "str"); changed = true }
                                if (changed) { file.writeText(text) }
                            } catch(e: Exception) {}
                        }
                    }
                }
                sanitizeDir(File(System.getProperty("user.home"), ".gradle/caches/transforms-3"))
                sanitizeDir(File(projectDir, "src/main/res"))
            }
        }
        EOF

    - name: Generator of Missing UI Resources
      run: |
        echo "Generating required UI assets and localized strings..."
        RES_DIR="openwave/android/app/src/main/res"
        mkdir -p "$RES_DIR/xml" "$RES_DIR/values" "$RES_DIR/mipmap-anydpi-v26" "$RES_DIR/drawable"
        
        # Backup and extraction rules
        echo '<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup><exclude domain="sharedpref" path="."/></cloud-backup></data-extraction-rules>' > "$RES_DIR/xml/data_extraction_rules.xml"
        echo '<?xml version="1.0" encoding="utf-8"?><full-backup-content><exclude domain="sharedpref" path="."/></full-backup-content>' > "$RES_DIR/xml/backup_rules.xml"
        
        # String resources (App name, notification channels, buttons)
        cat << 'EOF' > "$RES_DIR/values/kimi_missing_strings.xml"
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">OpenWave</string>
            <string name="playback_channel_name">Playback Controls</string>
            <string name="playback_channel_description">Media playback notifications</string>
            <string name="downloading_track">Downloading...</string>
            <string name="download_complete">Finished</string>
            <string name="download_failed">Failed</string>
            <string name="previous">Previous</string>
            <string name="pause">Pause</string>
            <string name="play">Play</string>
            <string name="next">Next</string>
        </resources>
        EOF
        echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.OpenWave" parent="android:Theme.DeviceDefault.NoActionBar"/></resources>' > "$RES_DIR/values/kimi_missing_themes.xml"
        
        # Icon resources (Placeholders for player controls)
        VECTOR_XML='<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FFFFFF" android:pathData="M8,5v14l11,-7z"/></vector>'
        for icon in play pause previous next ic_download ic_download_complete ic_download_error ic_notification ic_previous ic_pause ic_play ic_next; do
            echo "$VECTOR_XML" > "$RES_DIR/drawable/${icon}.xml"
        done
        
        # Main launcher icon
        echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#1DB954" android:pathData="M0,0h108v108h-108z"/></vector>' > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
        cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"

    - name: The Kotlin Auto-Reorganizer & Type Synthesizer
      run: |
        echo "Performing deep sanitization and reconstruction of Kotlin files..."
        python3 - <<'EOF'
        import os, re

        valid_starts = ('@', '//', '/*', 'package ', 'import ', 'class ', 'interface ', 'object ', 'fun ', 'val ', 'var ', 'typealias ', 'public ', 'private ', 'protected ', 'internal ', 'expect ', 'actual ', 'final ', 'open ', 'abstract ', 'sealed ', 'const ', 'external ', 'override ', 'lateinit ', 'tailrec ', 'vararg ', 'suspend ', 'inner ', 'enum ', 'annotation ', 'companion ', 'inline ', 'noinline ', 'crossinline ', 'reified ', 'infix ', 'operator ', 'data ')

        for root, dirs, files in os.walk('openwave/android/app/src/main/java'):
            for f in files:
                if not (f.endswith('.kt') or f.endswith('.java')): continue
                path = os.path.join(root, f)

                try:
                    with open(path, 'r', encoding='utf-8') as file: content = file.read()
                    original = content

                    # 1. Glue all code blocks from LLM output
                    b3 = chr(96) * 3
                    pattern = b3 + r'(?:kotlin|java|kt)?\n?(.*?)' + b3
                    blocks = re.findall(pattern, content, re.DOTALL | re.IGNORECASE)
                    if blocks:
                        # Filter blocks that are just language names
                        cleaned_blocks = [b.strip() for b in blocks if len(b.strip()) > 10]
                        content = '\n\n'.join(cleaned_blocks)
                    
                    content = content.replace(b3, '').strip()

                    # 2. Global Type and Class Sanitization
                    content = re.sub(r'\bOfflineDownloadEntity\b', 'OfflineDownload', content)

                    # 3. Structural Rebuild: Package -> Imports -> Body
                    lines = content.split('\n')
                    package_line = ""
                    imports = set()
                    clean_body = []

                    for line in lines:
                        s = line.strip()
                        if s.startswith('package '): 
                            if not package_line: package_line = s
                        elif s.startswith('import '):
                            imports.add(s)
                        else:
                            clean_body.append(line)

                    # 4. Remove conversational prefix garbage
                    start_idx = 0
                    for i, line in enumerate(clean_body):
                        s = line.strip()
                        if not s: continue
                        if any(s.startswith(v) for v in valid_starts):
                            start_idx = i
                            break
                    clean_body = clean_body[start_idx:]

                    # 5. Handle Parcelize and Missing Package
                    if 'data class OfflineDownload' in '\n'.join(clean_body) and 'Parcelable' not in '\n'.join(imports):
                        imports.add('import kotlinx.parcelize.Parcelize')
                        imports.add('import android.os.Parcelable')
                        imports.add('import androidx.room.Entity')
                        imports.add('import androidx.room.PrimaryKey')
                        body_str = '\n'.join(clean_body)
                        body_str = re.sub(r'data class OfflineDownload\s*\(', r'@Parcelize\n@Entity(tableName="offline_downloads")\ndata class OfflineDownload(', body_str)
                        body_str = re.sub(r'(data class OfflineDownload\s*\([^)]*\))', r'\1 : Parcelable', body_str)
                        if '@PrimaryKey' not in body_str:
                            body_str = re.sub(r'(val\s+[a-zA-Z0-9_]+\s*:)', r'@PrimaryKey \1', body_str, count=1)
                        clean_body = body_str.split('\n')

                    if not package_line:
                        parts = path.split('java/')[1] if 'java/' in path else path.split('kotlin/')[1]
                        pkg_dir = os.path.dirname(parts).replace('/', '.').replace('\\', '.')
                        if pkg_dir: package_line = f"package {pkg_dir}"

                    # Final Assembly
                    final = [package_line, ""] + sorted(list(imports)) + [""] + clean_body
                    with open(path, 'w', encoding='utf-8') as f_out:
                        f_out.write('\n'.join(final))
                except Exception: pass
        EOF

    - name: The Ultimate Room SuperHealer
      run: |
        echo "Resolving Room database inconsistencies and generating missing stubs..."
        python3 - <<'EOF'
        import os, re
        src_dir = 'openwave/android/app/src/main/java'
        all_classes = set()
        for r, d, files in os.walk(src_dir):
            for f in files:
                if f.endswith('.kt') or f.endswith('.java'):
                    try:
                        with open(os.path.join(r, f), 'r', encoding='utf-8') as kf:
                            content = kf.read()
                            for m in re.finditer(r'(?:class|interface|object)\s+([a-zA-Z0-9_]+)', content):
                                all_classes.add(m.group(1))
                    except: pass

        db_path = None
        for r, d, files in os.walk(src_dir):
            if 'AppDatabase.kt' in files:
                db_path = os.path.join(r, 'AppDatabase.kt')
                break

        if db_path:
            with open(db_path, 'r', encoding='utf-8') as f: content = f.read()
            pkg = re.search(r'^package\s+([a-zA-Z0-9_.]+)', content, re.M).group(1)
            
            # Find missing types referenced in AppDatabase
            def find_missing(regex, c_type):
                match = re.search(regex, content, re.S)
                if match:
                    for item in match.group(1).split(','):
                        name = re.sub(r'::class(\.java)?|\.class', '', item).strip()
                        if '.' in name: name = name.split('.')[-1]
                        if name and name not in all_classes:
                            f_path = os.path.join(os.path.dirname(db_path), f"{name}.kt")
                            code = f"package {pkg}\n\n"
                            if c_type == 'entity':
                                code += f"import androidx.room.Entity\nimport androidx.room.PrimaryKey\n@Entity\ndata class {name}(@PrimaryKey val id: String = \"def\")\n"
                            elif c_type == 'converter':
                                code += f"import androidx.room.TypeConverter\nclass {name} {{\n    @TypeConverter fun from(v: String?): List<String> = emptyList()\n    @TypeConverter fun to(l: List<String>?): String = \"\"\n}}\n"
                            with open(f_path, 'w', encoding='utf-8') as fout: fout.write(code)
                            print(f"Healed missing {c_type}: {name}")

            find_missing(r'@Database\s*\(\s*entities\s*=\s*[\[\{](.*?)[\]\}]', 'entity')
            find_missing(r'@TypeConverters\s*\(\s*(?:value\s*=\s*)?[\[\{]?(.*?)[\]\}]?\s*\)', 'converter')
        EOF

    - name: Build APK
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
