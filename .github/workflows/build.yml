name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Native Android App
      run: |
        # Розпаковуємо ваш архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # Переходимо в папку Android
        cd openwave/android
        
        # Використовуємо глобальний gradle, оскільки gradlew відсутній
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
