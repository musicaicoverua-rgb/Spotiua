name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: STEP 1 - Project Sterilization & Dependency Injection
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # Fix Repositories
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # Add Parcelize plugin
        if ! grep -q "kotlin-parcelize" openwave/android/app/build.gradle.kts; then
          sed -i '/id("com.android.application")/a \    id("kotlin-parcelize")' openwave/android/app/build.gradle.kts
        fi
        
        # Inject dependencies
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        dependencies {
            implementation("androidx.media3:media3-exoplayer:1.3.1")
            implementation("androidx.media3:media3-session:1.3.1")
            implementation("androidx.media3:media3-common:1.3.1")
            implementation("androidx.media3:media3-ui:1.3.1")
            implementation("androidx.media:media:1.7.0")
            implementation("com.jakewharton.timber:timber:5.0.1")
        }
        
        tasks.matching { it.name.startsWith("merge") && it.name.endsWith("Resources") }.configureEach {
            doFirst {
                val uStr = 92.toChar() + "u{str}"
                val regArt = Regex("<string name=\"artist_name\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                val regUsr = Regex("<string name=\"username_optional\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                
                fun sanitizeDir(dir: File) {
                    if (dir.exists()) {
                        dir.walkTopDown().filter { it.name.endsWith(".xml") }.forEach { f ->
                            try {
                                var txt = f.readText()
                                var changed = false
                                if (txt.contains("artist_name")) { txt = txt.replace(regArt, ""); changed = true }
                                if (txt.contains("username_optional")) { txt = txt.replace(regUsr, ""); changed = true }
                                if (txt.contains(uStr)) { txt = txt.replace(uStr, "str"); changed = true }
                                if (changed) { f.writeText(txt) }
                            } catch(e: Exception) {}
                        }
                    }
                }
                sanitizeDir(File(System.getProperty("user.home"), ".gradle/caches/transforms-3"))
                sanitizeDir(File(projectDir, "src/main/res"))
            }
        }
        EOF

    - name: STEP 2 - UI & Resource Generator
      run: |
        RES_DIR="openwave/android/app/src/main/res"
        mkdir -p "$RES_DIR/xml" "$RES_DIR/values" "$RES_DIR/mipmap-anydpi-v26" "$RES_DIR/drawable"
        
        echo '<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup><exclude domain="sharedpref" path="."/></cloud-backup></data-extraction-rules>' > "$RES_DIR/xml/data_extraction_rules.xml"
        echo '<?xml version="1.0" encoding="utf-8"?><full-backup-content><exclude domain="sharedpref" path="."/></full-backup-content>' > "$RES_DIR/xml/backup_rules.xml"
        
        cat << 'EOF' > "$RES_DIR/values/kimi_missing_strings.xml"
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">OpenWave</string>
            <string name="playback_channel_name">Music Playback</string>
            <string name="playback_channel_description">Notifications for audio playback</string>
            <string name="downloading_track">Downloading...</string>
            <string name="download_complete">Downloaded</string>
            <string name="download_failed">Error</string>
            <string name="previous">Back</string>
            <string name="pause">Pause</string>
            <string name="play">Play</string>
            <string name="next">Next</string>
        </resources>
        EOF
        echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.OpenWave" parent="android:Theme.DeviceDefault.NoActionBar"/></resources>' > "$RES_DIR/values/kimi_missing_themes.xml"
        
        V_XML='<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FFFFFF" android:pathData="M8,5v14l11,-7z"/></vector>'
        for i in play pause previous next ic_download ic_download_complete ic_download_error ic_notification ic_previous ic_pause ic_play ic_next; do
            echo "$V_XML" > "$RES_DIR/drawable/${i}.xml"
        done
        
        echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#1DB954" android:pathData="M0,0h108v108h-108z"/></vector>' > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
        cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"

    - name: STEP 3 - The Hard Reset (Rewriting Broken Files)
      run: |
        echo "Completely rewriting corrupted AI files..."
        python3 - <<'EOF'
        import os

        # Helper to safely extract package from AppDatabase.kt
        src_dir = 'openwave/android/app/src/main/java'
        base_pkg = "com.openwave.app"
        
        for r, d, f in os.walk(src_dir):
            if 'AppDatabase.kt' in f:
                with open(os.path.join(r, 'AppDatabase.kt'), 'r') as db_f:
                    for line in db_f:
                        if line.startswith('package'):
                            # Try to extract base package
                            pkg_str = line.replace('package ', '').strip()
                            if '.data' in pkg_str:
                                base_pkg = pkg_str.split('.data')[0]
                            break

        # FILE 1: Track.kt
        track_path = os.path.join(src_dir, base_pkg.replace('.', '/'), 'domain/model/Track.kt')
        os.makedirs(os.path.dirname(track_path), exist_ok=True)
        with open(track_path, 'w') as f:
            f.write(f"""package {base_pkg}.domain.model

import android.os.Parcelable
import kotlinx.parcelize.Parcelize

@Parcelize
data class Track(
    val id: String = "",
    val title: String = "Unknown Title",
    val artist: String = "Unknown Artist",
    val coverUrl: String = "",
    val streamUrl: String = "",
    val duration: Long = 0L
) : Parcelable
""")

        # FILE 2: OfflineDownload.kt (Entity)
        dl_path = os.path.join(src_dir, base_pkg.replace('.', '/'), 'data/local/OfflineDownload.kt')
        os.makedirs(os.path.dirname(dl_path), exist_ok=True)
        with open(dl_path, 'w') as f:
            f.write(f"""package {base_pkg}.data.local

import android.os.Parcelable
import androidx.room.Entity
import androidx.room.PrimaryKey
import kotlinx.parcelize.Parcelize

@Parcelize
@Entity(tableName = "offline_downloads")
data class OfflineDownload(
    @PrimaryKey val id: String = "",
    val trackId: String = "",
    val filePath: String = "",
    val isComplete: Boolean = false,
    val progress: Int = 0
) : Parcelable
""")

        # FILE 3: OfflineDownloadDao.kt
        dao_path = os.path.join(src_dir, base_pkg.replace('.', '/'), 'data/local/OfflineDownloadDao.kt')
        os.makedirs(os.path.dirname(dao_path), exist_ok=True)
        with open(dao_path, 'w') as f:
            f.write(f"""package {base_pkg}.data.local

import androidx.room.Dao
import androidx.room.Insert
import androidx.room.OnConflictStrategy
import androidx.room.Query
import kotlinx.coroutines.flow.Flow

@Dao
interface OfflineDownloadDao {{
    @Query("SELECT * FROM offline_downloads")
    fun getAllDownloads(): Flow<List<OfflineDownload>>

    @Query("SELECT * FROM offline_downloads WHERE trackId = :trackId")
    suspend fun getDownloadByTrackId(trackId: String): OfflineDownload?

    @Insert(onConflict = OnConflictStrategy.REPLACE)
    suspend fun insertDownload(download: OfflineDownload)

    @Query("DELETE FROM offline_downloads WHERE trackId = :trackId")
    suspend fun deleteDownload(trackId: String)
}}
""")

        # FILE 4: User.kt
        user_path = os.path.join(src_dir, base_pkg.replace('.', '/'), 'domain/model/User.kt')
        os.makedirs(os.path.dirname(user_path), exist_ok=True)
        with open(user_path, 'w') as f:
            f.write(f"""package {base_pkg}.domain.model

data class User(
    val id: String = "",
    val username: String = "",
    val profilePicUrl: String = ""
)

enum class ItemType {{
    TRACK,
    PLAYLIST,
    ALBUM
}}
""")

        # General Cleanup for the rest of the files (Just taking the biggest block)
        for root, dirs, files in os.walk(src_dir):
            for name in files:
                if not (name.endswith('.kt') or name.endswith('.java')): continue
                if name in ['Track.kt', 'OfflineDownload.kt', 'OfflineDownloadDao.kt', 'User.kt', 'AppDatabase.kt']: continue
                
                p = os.path.join(root, name)
                try:
                    with open(p, 'r', encoding='utf-8') as file: raw = file.read()
                    
                    if '```' in raw:
                        import re
                        blocks = re.findall(r'                         if blocks:
                            cleaned = max(blocks, key=len)
                            with open(p, 'w', encoding='utf-8') as out: out.write(cleaned)
                except: pass
        EOF

    - name: STEP 4 - Database Stability & Stubs
      run: |
        python3 - <<'EOF'
        import os, re
        src = 'openwave/android/app/src/main/java'
        existing = set()
        for r, d, files in os.walk(src):
            for f in files:
                if f.endswith('.kt'):
                    try:
                        with open(os.path.join(r, f), 'r') as k:
                            for m in re.finditer(r'(?:class|interface)\s+([a-zA-Z0-9_]+)', k.read()):
                                existing.add(m.group(1))
                    except: pass
        
        db_file = None
        for r, d, files in os.walk(src):
            if 'AppDatabase.kt' in files:
                db_file = os.path.join(r, 'AppDatabase.kt')
                break
        
        if db_file:
            with open(db_file, 'r') as f: content = f.read()
            pkg_m = re.search(r'^package\s+(.*)', content, re.M)
            if pkg_match:
                pkg = pkg_match.group(1).strip()
                def mk(rx, t):
                    for i in re.findall(rx, content, re.S):
                        for name in re.split(r',\s*', i):
                            n = re.sub(r'[^a-zA-Z0-9_]', '', re.sub(r'::class.*|\.class|//.*|/\*.*?\*/', '', name).split('.')[-1])
                            if n and n not in existing:
                                with open(os.path.join(os.path.dirname(db_file), f"{n}.kt"), 'w') as out:
                                    out.write(f"package {pkg}\nimport androidx.room.*\n")
                                    if t == 'e': out.write(f"@Entity\ndata class {n}(@PrimaryKey val id: String = \"\")\n")
                                    else: out.write(f"class {n} {{ @TypeConverter fun f(v:String?):List<String> = emptyList() }}\n")
                mk(r'entities\s*=\s*[\[\{](.*?)[\]\}]', 'e')
                mk(r'@TypeConverters\s*\(\s*(?:value\s*=\s*)?[\[\{]?(.*?)[\]\}]?\s*\)', 'c')
        EOF

    - name: STEP 5 - Compile & Build
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: STEP 6 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-Final-Build
        path: '**/*.apk'
