name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Prepare and Patch Android Project
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. ВИПРАВЛЕННЯ ПОМИЛКИ ДУБЛІКАТІВ РЕПОЗИТОРІЇВ
        # Міняємо сувору заборону на дозвіл використовувати проектні налаштування
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts

    - name: Build Native Android App
      run: |
        # Переходимо в папку Android
        cd openwave/android
        
        # Запускаємо збірку
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
