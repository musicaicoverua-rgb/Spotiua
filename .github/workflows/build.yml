name: Flutter Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: 4. Unpack Source Code
        run: |
          unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
          DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          echo "FLUTTER_DIR=$DIR" >> $GITHUB_ENV

      - name: 5. Purge Broken Legacy Code
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          rm -rf lib/features/admin
          rm -rf lib/features/auth/presentation/bloc
          rm -rf lib/features/home/presentation/bloc
          rm -rf lib/features/player/presentation/bloc
          rm -rf lib/core/models
          rm -f lib/core/services/supabase_service.dart

      - name: 6. Configure Android, Pubspec and Languages
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/values
          mkdir -p assets/images assets/animations assets/icons assets/fonts assets/translations
          
          echo "kotlin_version=1.9.0" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties
          echo "flutter.compileSdkVersion=35" >> android/local.properties
          echo "flutter.minSdkVersion=24" >> android/local.properties
          
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png assets/images/logo.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png assets/images/default_cover.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png assets/icons/icon.png
          
          FONTS=("Regular" "Medium" "SemiBold" "Bold" "Light" "ExtraLight" "Thin" "Black" "ExtraBold")
          for font in "${FONTS[@]}"; do
            cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf "assets/fonts/Inter-$font.ttf" || echo "fake" > "assets/fonts/Inter-$font.ttf"
          done
          
          ICONS=("google.png" "apple.png" "facebook.png" "placeholder.png")
          for icon in "${ICONS[@]}"; do
            cp assets/images/logo.png "assets/icons/$icon"
          done
          
          echo '{"home": "Головна", "library": "Бібліотека", "profile": "Профіль", "radio": "Радіо", "chat": "Підтримка"}' > assets/translations/uk.json
          echo '{"home": "Home", "library": "Library", "profile": "Profile", "radio": "Radio", "chat": "Support"}' > assets/translations/en.json
          echo '{"home": "Główna", "library": "Biblioteka", "profile": "Profil", "radio": "Radio", "chat": "Wsparcie"}' > assets/translations/pl.json
          echo '{"home": "Inicio", "library": "Biblioteca", "profile": "Perfil", "radio": "Radio", "chat": "Soporte"}' > assets/translations/es.json
          echo '{"home": "Startseite", "library": "Bibliothek", "profile": "Profil", "radio": "Radio", "chat": "Support"}' > assets/translations/de.json
          echo '{"home": "Accueil", "library": "Bibliothèque", "profile": "Profil", "radio": "Radio", "chat": "Support"}' > assets/translations/fr.json
          echo '{"home": "Domů", "library": "Knihovna", "profile": "Profil", "radio": "Rádio", "chat": "Podpora"}' > assets/translations/cs.json
          echo '{"home": "Главная", "library": "Библиотека", "profile": "Профиль", "radio": "Радио", "chat": "Поддержка"}' > assets/translations/ru.json

          echo "{}" > assets/animations/loading.json
          echo "{}" > assets/animations/success.json
          echo "{}" > assets/animations/confetti.json
          echo "{}" > assets/animations/error.json
          echo "{}" > assets/animations/empty.json
          
          cat << 'EOF' > android/app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar"><item name="android:windowBackground">@android:color/black</item></style>
              <style name="NormalTheme" parent="@android:style/Theme.Light.NoTitleBar"><item name="android:windowBackground">@android:color/black</item></style>
          </resources>
          EOF

          python3 - << 'EOF'
          import os, re
          
          with open('pubspec.yaml', 'r', encoding='utf-8') as f: p = f.read()
          p = re.sub(r'^\s*just_audio:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*just_audio_background:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*supabase_flutter:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*build_runner:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*json_serializable:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*json_annotation:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*file_picker:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*easy_localization:.*?\n', '', p, flags=re.MULTILINE)
          
          p = p.replace('dependencies:', 'dependencies:\n  easy_localization: ^3.0.3\n  just_audio: ^0.9.36\n  just_audio_background: ^0.0.1-beta.13\n  supabase_flutter: ^2.0.0\n  file_picker: ^6.1.1\n')
          
          if 'assets/translations/' not in p:
              p = p.replace('assets/fonts/', 'assets/translations/\n    - assets/fonts/')
          
          if 'dependency_overrides:' not in p: p += '\ndependency_overrides:\n  intl: ^0.19.0\n  web: ^0.5.0\n'
          with open('pubspec.yaml', 'w', encoding='utf-8') as f: f.write(p)
          
          g_path = 'android/build.gradle'
          if os.path.exists(g_path):
              with open(g_path, 'r') as f: g = f.read()
              g = re.sub(r"ext\.kotlin_version\s*=\s*['\"].*?['\"]", "", g)
              if 'buildscript {' in g: g = g.replace('buildscript {', "buildscript {\n    ext.kotlin_version = '1.9.0'\n")
              else: g = "buildscript {\n    ext.kotlin_version = '1.9.0'\n}\n" + g
              with open(g_path, 'w') as f: f.write(g)
              
          app_g_path = 'android/app/build.gradle'
          if os.path.exists(app_g_path):
              with open(app_g_path, 'r', encoding='utf-8') as f: ag = f.read()
              ag = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 35', ag)
              ag = re.sub(r'compileSdk\s+\d+', 'compileSdk 35', ag)
              with open(app_g_path, 'w', encoding='utf-8') as f: f.write(ag)
              
          m_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(m_path):
              with open(m_path, 'r', encoding='utf-8') as f: m = f.read()
              for perm in ['INTERNET', 'WAKE_LOCK', 'FOREGROUND_SERVICE', 'FOREGROUND_SERVICE_MEDIA_PLAYBACK', 'READ_EXTERNAL_STORAGE']:
                  if perm not in m: m = m.replace('<application', f'    <uses-permission android:name="android.permission.{perm}" />\n    <application')
              
              if 'usesCleartextTraffic' not in m: m = m.replace('<application', '<application android:usesCleartextTraffic="true" ')
              
              m = m.replace('.MainActivity', 'com.ryanheise.audioservice.AudioServiceActivity')
              if 'MediaButtonReceiver' not in m:
                  m = m.replace('</activity>', '</activity>\n        <receiver android:name="com.ryanheise.audioservice.MediaButtonReceiver" android:exported="true"><intent-filter><action android:name="android.intent.action.MEDIA_BUTTON" /></intent-filter></receiver>\n        <service android:name="com.ryanheise.audioservice.AudioService" android:foregroundServiceType="mediaPlayback" android:exported="true"><intent-filter><action android:name="android.media.browse.MediaBrowserService" /></intent-filter></service>')
              with open(m_path, 'w', encoding='utf-8') as f: f.write(m)
              
          for r, d, fs in os.walk('android/app/src/main'):
              for f in fs:
                  if f in ['MainActivity.kt', 'MainActivity.java']:
                      p_path = os.path.join(r, f)
                      with open(p_path, 'r') as fl: txt = fl.read()
                      pkg = re.search(r'package\s+([a-zA-Z0-9_\.]+)', txt).group(1) if re.search(r'package\s+([a-zA-Z0-9_\.]+)', txt) else "com.openwave.app"
                      with open(p_path, 'w') as fl: fl.write(f"package {pkg}\nimport io.flutter.embedding.android.FlutterActivity\nimport com.ryanheise.audioservice.AudioServiceActivity\nclass MainActivity: AudioServiceActivity() {{}}\n")
          
          def rep(m):
              t, c = m.group(1), m.group(2)
              if 'Companion' in c: return f"(delete({t})..where((tbl) => tbl.id.equals({re.search(r'id:\s*Value\((.*?)\)', c).group(1)}))).go();"
              return f"(delete({t})..where((tbl) => {c.replace(t+'.', 'tbl.')})).go();"
          for r, d, fs in os.walk('lib'):
              for f in fs:
                  if not f.endswith('.dart'): continue
                  p_path = os.path.join(r, f)
                  with open(p_path, 'r', encoding='utf-8') as file: txt = file.read()
                  orig = txt
                  txt = txt.replace("json['isAdmin']", "json['is_admin']")
                  txt = txt.replace("DatabaseConnection _openConnection()", "QueryExecutor _openConnection()")
                  txt = txt.replace("DatabaseConnection openConnection()", "QueryExecutor openConnection()")
                  txt = re.sub(r'delete\(([a-zA-Z0-9_]+)\)\.delete\((.*?)\);', rep, txt, flags=re.DOTALL)
                  txt = re.sub(r'native:\s*(?:const\s+)?DriftNativeOptions\s*\(.*?\)\s*,?', '', txt, flags=re.DOTALL)
                  if orig != txt:
                      with open(p_path, 'w', encoding='utf-8') as file: file.write(txt)
          EOF

      - name: 7. Generate Core Logic
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          mkdir -p lib/core/services lib/core/models
          
          cat << 'EOF' > lib/core/models/track_model.dart
          class TrackModel {
            final String id, title, artist; final String? audioUrl, coverUrl;
            TrackModel({required this.id, required this.title, required this.artist, this.audioUrl, this.coverUrl});
            factory TrackModel.fromJson(Map<String, dynamic> json) {
              return TrackModel(
                id: json['id']?.toString() ?? '', 
                title: json['title']?.toString() ?? 'Невідомий трек', 
                artist: json['artist']?.toString() ?? 'Невідомий артист', 
                audioUrl: json['audio_url']?.toString() ?? json['audioUrl']?.toString() ?? json['file_path']?.toString() ?? json['url']?.toString(), 
                coverUrl: json['cover_url']?.toString() ?? json['coverUrl']?.toString() ?? json['image_url']?.toString()
              );
            }
          }
          EOF

          cat << 'EOF' > lib/core/models/playlist_model.dart
          class PlaylistModel { 
            final String id, name; 
            PlaylistModel({required this.id, required this.name}); 
            factory PlaylistModel.fromJson(Map<String, dynamic> json) {
              return PlaylistModel(id: json['id'].toString(), name: json['name'].toString());
            }
          }
          EOF

          cat << 'EOF' > lib/core/services/supabase_service.dart
          import 'dart:io';
          import 'package:flutter/foundation.dart';
          import 'package:supabase_flutter/supabase_flutter.dart';
          import '../models/track_model.dart';
          import '../models/playlist_model.dart';
          
          class SupabaseService {
            final _c = Supabase.instance.client;
            String? get currentUserId => _c.auth.currentUser?.id;
            
            Future<List<TrackModel>> getTracks() async { 
              try { 
                final response = await _c.from('tracks').select().order('created_at', ascending: false);
                return (response as List).map((e) => TrackModel.fromJson(e as Map<String, dynamic>)).toList(); 
              } catch(e) { return []; } 
            }
            
            Future<bool> isAdmin() async { 
              try { 
                if (currentUserId == null) return false; 
                final res = await _c.from('profiles').select('is_admin').eq('id', currentUserId!).maybeSingle(); 
                return res != null && res['is_admin'] == true; 
              } catch(e) { return false; } 
            }

            Future<bool> editTrack(String id, String newTitle, String newArtist) async {
              try { await _c.from('tracks').update({'title': newTitle, 'artist': newArtist}).eq('id', id); return true; } catch(e) { return false; }
            }

            Future<bool> deleteTrack(String id) async {
              try { await _c.from('tracks').delete().eq('id', id); return true; } catch(e) { return false; }
            }
            
            // --- ПЛЕЙЛИСТИ ---
            Future<List<PlaylistModel>> getPlaylists() async {
              try { final res = await _c.from('playlists').select().order('created_at', ascending: false); return (res as List).map((e) => PlaylistModel.fromJson(e)).toList(); } catch(e) { return []; }
            }
            Future<bool> createPlaylist(String name) async {
              try { await _c.from('playlists').insert({'name': name}); return true; } catch(e) { return false; }
            }
            // РЕДАГУВАННЯ ПЛЕЙЛИСТА
            Future<bool> editPlaylist(String id, String newName) async {
              try { await _c.from('playlists').update({'name': newName}).eq('id', id); return true; } catch(e) { return false; }
            }
            // ВИДАЛЕННЯ ПЛЕЙЛИСТА
            Future<bool> deletePlaylist(String id) async {
              try { 
                await _c.from('playlist_tracks').delete().eq('playlist_id', id);
                await _c.from('playlists').delete().eq('id', id); 
                return true; 
              } catch(e) { return false; }
            }
            Future<bool> addTrackToPlaylist(String playlistId, String trackId) async {
              try { await _c.from('playlist_tracks').insert({'playlist_id': playlistId, 'track_id': trackId}); return true; } catch(e) { return false; }
            }
            // ОТРИМАННЯ ТРЕКІВ ДЛЯ ПЛЕЙЛИСТА ЩОБ ЇХ ГРАТИ
            Future<List<TrackModel>> getPlaylistTracks(String playlistId) async {
               try {
                 final res = await _c.from('playlist_tracks').select('track_id').eq('playlist_id', playlistId);
                 if ((res as List).isEmpty) return [];
                 final ids = res.map((e) => e['track_id']).toList();
                 final tracksRes = await _c.from('tracks').select().inFilter('id', ids);
                 return (tracksRes as List).map((e) => TrackModel.fromJson(e)).toList();
               } catch(e) { return []; }
            }
            
            // --- УЛЮБЛЕНЕ ---
            Future<bool> toggleFavorite(String trackId, bool isFav) async {
              if (currentUserId == null) return false;
              try {
                if (isFav) { await _c.from('favorites').delete().eq('user_id', currentUserId!).eq('track_id', trackId); } 
                else { await _c.from('favorites').insert({'user_id': currentUserId, 'track_id': trackId}); }
                return true;
              } catch(e) { return false; }
            }
            Future<bool> isFavorite(String trackId) async {
              if (currentUserId == null) return false;
              try { final r = await _c.from('favorites').select().eq('user_id', currentUserId!).eq('track_id', trackId).maybeSingle(); return r != null; } catch(e) { return false; }
            }
            Future<List<TrackModel>> getFavoriteTracks() async {
               if (currentUserId == null) return [];
               try {
                 final favs = await _c.from('favorites').select('track_id').eq('user_id', currentUserId!);
                 if ((favs as List).isEmpty) return [];
                 final ids = favs.map((e) => e['track_id']).toList();
                 final res = await _c.from('tracks').select().inFilter('id', ids);
                 return (res as List).map((e) => TrackModel.fromJson(e)).toList();
               } catch(e) { return []; }
            }
            
            Future<Map<String, int>> getAnalytics() async {
               try { final tr = await _c.from('tracks').select('id'); final pl = await _c.from('playlists').select('id'); return {'tracks': tr.length, 'playlists': pl.length}; } catch(e) { return {'tracks': 0, 'playlists': 0}; }
            }

            Future<String> uploadNewTrack(String title, String artist, String audioPath, String? imagePath) async {
              try {
                final audioFile = File(audioPath); final audioExt = audioPath.split('.').last; final audioName = 'track_${DateTime.now().millisecondsSinceEpoch}.$audioExt';
                await _c.storage.from('tracks').upload(audioName, audioFile);
                final audioUrl = _c.storage.from('tracks').getPublicUrl(audioName);
                String? imageUrl;
                if (imagePath != null) {
                  final imgFile = File(imagePath); final imgExt = imagePath.split('.').last; final imgName = 'cover_${DateTime.now().millisecondsSinceEpoch}.$imgExt';
                  await _c.storage.from('covers').upload(imgName, imgFile);
                  imageUrl = _c.storage.from('covers').getPublicUrl(imgName);
                }
                await _c.from('tracks').insert({'title': title, 'artist': artist, 'audio_url': audioUrl, 'file_path': audioUrl, 'cover_url': imageUrl});
                return 'ok';
              } catch(e) { return "❌ ПОМИЛКА БАЗИ:\n$e"; }
            }
          }
          EOF

          cat << 'EOF' > lib/core/services/simple_audio_service.dart
          import 'package:flutter/foundation.dart';
          import 'package:just_audio/just_audio.dart';
          import 'package:just_audio_background/just_audio_background.dart';
          import 'package:openwave/core/models/track_model.dart';
          import 'package:supabase_flutter/supabase_flutter.dart';
          
          class SimpleAudioService {
            static final SimpleAudioService _instance = SimpleAudioService._internal();
            factory SimpleAudioService() => _instance;
            
            final AudioPlayer player = AudioPlayer();
            final ValueNotifier<TrackModel?> currentTrack = ValueNotifier(null);
            List<TrackModel> currentQueue = [];
            
            SimpleAudioService._internal() {
               // АВТОМАТИЧНЕ ПЕРЕМИКАННЯ (Коли пісня дограє, just_audio сам перемикає, а ми оновлюємо UI)
               player.currentIndexStream.listen((index) {
                  if (index != null && index < currentQueue.length) {
                     currentTrack.value = currentQueue[index];
                  }
               });
            }
            
            Future<void> playQueue(List<TrackModel> tracks, {int initialIndex = 0}) async {
              if(tracks.isEmpty) return;
              currentQueue = tracks;
              currentTrack.value = tracks[initialIndex];
              
     
