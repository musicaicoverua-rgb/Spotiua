name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Using Flutter 3.22.0 to satisfy the Dart 3.4.0 requirement for drift_flutter
    - name: Install Flutter (Stable 3.22.0)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: STEP 1 - Unpack Project
      run: |
        unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
        FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
        echo "Found Flutter project in directory: $FLUTTER_DIR"
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: STEP 2 - The Smart Dependency Override
      run: |
        cd ${{ env.FLUTTER_DIR }}
        echo "Applying dependency overrides to resolve 'web' and 'intl' conflicts..."
        
        cat << 'EOF' >> pubspec.yaml
        
        dependency_overrides:
          web: ^0.5.0
          intl: ^0.19.0
        EOF

    - name: STEP 3 - Fix Kimi's Native Android Config
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        mkdir -p android
        
        echo "kotlin_version=1.9.0" >> android/gradle.properties
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
        
        echo "flutter.compileSdkVersion=34" >> android/local.properties
        echo "flutter.minSdkVersion=24" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties

    - name: STEP 4 - The AI Code Doctor
      run: |
        cd ${{ env.FLUTTER_DIR }}
        echo "Healing Kimi's AI hallucinations in Dart database syntax..."
        python3 - <<'EOF'
        import os, re
        
        for root, dirs, files in os.walk('lib'):
            for f in files:
                if f.endswith('.dart'):
                    path = os.path.join(root, f)
                    with open(path, 'r', encoding='utf-8') as file:
                        content = file.read()
                    
                    orig_content = content
                    
                    # 1. Fix hallucinated delete syntax
                    # delete(table).delete(condition); -> (delete(table)..where((tbl) => condition)).go();
                    content = re.sub(
                        r'delete\(\s*([a-zA-Z0-9_]+)\s*\)\.delete\(\s*(.*?)\s*,?\s*\)\s*;',
                        r'(delete(\1)..where((tbl) => \2)).go();',
                        content,
                        flags=re.DOTALL
                    )
                    
                    # 2. Fix hallucinated 'native' parameter in driftDatabase
                    content = re.sub(
                        r'native:\s*(?:const\s+)?DriftNativeOptions\s*\((?:[^)(]+|\([^)(]*\))*\)\s*,?',
                        r'',
                        content,
                        flags=re.DOTALL
                    )
                    
                    if orig_content != content:
                        with open(path, 'w', encoding='utf-8') as file:
                            file.write(content)
                        print(f"Healed Drift database syntax in {f}")
        EOF

    - name: STEP 5 - Pub Get & Generate Code
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        echo "Downloading packages..."
        flutter pub get
        
        echo "Running code generator for database (Drift)..."
        dart run build_runner build --delete-conflicting-outputs || true

    - name: STEP 6 - Build Production APK
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter build apk --debug

    - name: STEP 7 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-App-Ready
        path: "**/build/app/outputs/flutter-apk/*.apk"
