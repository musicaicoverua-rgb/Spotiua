name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Fix Kotlin Conflict
      run: |
        mkdir -p ~/.gradle
        cat << 'EOF' > ~/.gradle/init.gradle
        allprojects {
            configurations.all {
                resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                    if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.startsWith('kotlin-stdlib')) {
                        details.useVersion '1.8.22'
                    }
                }
            }
        }
        EOF

    - name: Patch Admin Logic and Build
      run: |
        unzip "Kimi_Agent_OpenWave Admin Email Config.zip"
        
        # 1. ПРАВИМО useTracks.ts (Логіка адміна)
        TARGET_FILE=$(find . -name useTracks.ts | head -n 1)
        python3 - <<EOF
        import sys
        path = "$TARGET_FILE"
        with open(path, 'r') as f: content = f.read()
        
        # Додаємо сувору перевірку
        admin_logic = """
            const { data: { user: adminUser } } = await supabase.auth.getUser()
            if (!adminUser) throw new Error('Ви не авторизовані!')
            if (adminUser.email.toLowerCase() !== 'andriimykolyshyn@gmail.com') {
                alert('Ви увійшли як: ' + adminUser.email + '. Доступ заборонено!');
                throw new Error('Тільки Андрій має доступ');
            }
        """
        content = content.replace("const { data: { user } } = await supabase.auth.getUser()", "const { data: { user } } = await supabase.auth.getUser()" + admin_logic)
        content = content.replace("return data", "alert('Успіх! Оновлюємо список.'); window.location.href = '/'; return data")
        
        with open(path, 'w') as f: f.write(content)
        EOF

        # 2. ПРАВИМО UploadTrackForm.tsx (Щоб не було фейкових успіхів)
        FORM_FILE=$(find . -name UploadTrackForm.tsx | head -n 1)
        python3 - <<EOF
        import sys
        path = "$FORM_FILE"
        with open(path, 'r') as f: content = f.read()
        # Видаляємо фейкову анімацію завантаження, щоб бачити реальний результат
        content = content.replace("setUploadProgress(prev => Math.min(prev + 10, 90))", "setUploadProgress(100)")
        with open(path, 'w') as f: f.write(content)
        EOF

        # 3. ЗБІРКА
        SCRIPT_DIR=$(dirname $(find . -name build-apk.sh | head -n 1))
        cd "$SCRIPT_DIR"
        chmod +x build-apk.sh
        ./build-apk.sh

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Admin-Final
        path: '**/*.apk'
