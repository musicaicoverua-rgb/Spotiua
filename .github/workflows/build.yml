name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Correct Gradle Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare Local Project
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Виправляємо налаштування Android
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 3. Видаляємо локальну помилку Kimi (Ця частина працює ідеально)
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/username_optional/d' {} + || true
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/{str}/d' {} + || true

    - name: First Build (Prime the Cache)
      # Цей крок спеціально проігнорує помилку, щоб просто завантажити файли Google на сервер
      continue-on-error: true
      run: |
        cd openwave/android
        gradle assembleDebug || true

    - name: The Nuclear Option (Overwrite Google's Bug)
      run: |
        echo "Зупиняємо Gradle, щоб розблокувати системні файли..."
        cd openwave/android
        gradle --stop
        
        echo "Перезаписуємо зламаний український переклад на чистий і легальний XML..."
        # Замість спроб щось вирізати, ми просто заливаємо туди порожній скелет <resources></resources>
        find /home/runner/.gradle/caches/transforms-3 -type f -name "values-uk.xml" -exec sh -c 'echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources></resources>" > "$1"' _ {} \;
        
        echo "Операція успішна! Кеш вилікувано."

    - name: Final Build (Success)
      run: |
        cd openwave/android
        # Тепер Android побачить ідеально чистий файл і збере APK без жодних питань
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
