name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Correct Gradle Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare Local Project
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Виправляємо налаштування Android
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 3. Видаляємо локальну помилку Kimi (Це працює ідеально!)
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/username_optional/d' {} + || true
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/{str}/d' {} + || true

    - name: First Build (Download Protected Libraries)
      run: |
        cd openwave/android
        # Запускаємо збірку. Вона зупиниться через баг Google, але файли залишаться на сервері
        gradle assembleDebug || echo "Перша збірка завершена, бібліотеки завантажено в кеш!"

    - name: Unlock Cache and Destroy Google Bug
      run: |
        echo "Знімаємо бетонний захист з системного кешу Gradle..."
        chmod -R 777 ~/.gradle/caches/transforms-3
        
        echo "Вирізаємо зламаний український переклад artist_name з бібліотек Google..."
        find ~/.gradle/caches/transforms-3 -name "values-uk.xml" -type f -exec sed -i '/artist_name/d' {} + || true
        find ~/.gradle/caches/transforms-3 -name "values-uk.xml" -type f -exec sed -i '/{str}/d' {} + || true

    - name: Final Build (Success)
      run: |
        cd openwave/android
        # Тепер шлях чистий, додаток збереться на 100%
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
