name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Inject Gradle Hook and Fix Settings
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        tasks.matching { it.name.startsWith("merge") && it.name.endsWith("Resources") }.configureEach {
            doFirst {
                val uStr = 92.toChar() + "u{str}"
                val regArtist = Regex("<string name=\"artist_name\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                val regUser = Regex("<string name=\"username_optional\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                
                fun sanitizeDir(dir: File) {
                    if (dir.exists()) {
                        dir.walkTopDown().filter { it.name.endsWith(".xml") }.forEach { file ->
                            try {
                                var text = file.readText()
                                var changed = false
                                if (text.contains("artist_name")) { text = text.replace(regArtist, ""); changed = true }
                                if (text.contains("username_optional")) { text = text.replace(regUser, ""); changed = true }
                                if (text.contains(uStr)) { text = text.replace(uStr, "str"); changed = true }
                                if (changed) { file.writeText(text) }
                            } catch(e: Exception) {}
                        }
                    }
                }
                sanitizeDir(File(System.getProperty("user.home"), ".gradle/caches/transforms-3"))
                sanitizeDir(File(projectDir, "src/main/res"))
            }
        }
        EOF

    - name: Generator of Missing LLM Resources
      run: |
        RES_DIR="openwave/android/app/src/main/res"
        mkdir -p "$RES_DIR/xml" "$RES_DIR/values" "$RES_DIR/mipmap-anydpi-v26"
        
        echo '<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup><exclude domain="sharedpref" path="."/></cloud-backup></data-extraction-rules>' > "$RES_DIR/xml/data_extraction_rules.xml"
        echo '<?xml version="1.0" encoding="utf-8"?><full-backup-content><exclude domain="sharedpref" path="."/></full-backup-content>' > "$RES_DIR/xml/backup_rules.xml"
        
        echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">OpenWave</string></resources>' > "$RES_DIR/values/kimi_missing_strings.xml"
        echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.OpenWave" parent="android:Theme.DeviceDefault.NoActionBar"/></resources>' > "$RES_DIR/values/kimi_missing_themes.xml"
        
        cat << 'EOF' > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1DB954" android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF
        cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"

    - name: The Kotlin Auto-Reorganizer
      run: |
        echo "Deep structural reorganization of Kotlin files..."
        python3 - <<'EOF'
        import os, re

        valid_starts = (
            '@', '//', '/*',
            'class ', 'interface ', 'object ', 'fun ', 'val ', 'var ', 'typealias ',
            'public ', 'private ', 'protected ', 'internal ', 'expect ', 'actual ',
            'final ', 'open ', 'abstract ', 'sealed ', 'const ', 'external ',
            'override ', 'lateinit ', 'tailrec ', 'vararg ', 'suspend ', 'inner ',
            'enum ', 'annotation ', 'companion ', 'inline ', 'noinline ',
            'crossinline ', 'reified ', 'infix ', 'operator ', 'data '
        )

        for root, dirs, files in os.walk('openwave/android/app/src/main/java'):
            for f in files:
                if not (f.endswith('.kt') or f.endswith('.java')): continue
                path = os.path.join(root, f)

                try:
                    with open(path, 'r', encoding='utf-8') as file:
                        content = file.read()

                    # Extract pure code from markdown safely
                    b3 = chr(96) * 3
                    pattern = b3 + r'(?:kotlin|java|kt)?\n?(.*?)' + b3
                    blocks = re.findall(pattern, content, re.DOTALL | re.IGNORECASE)
                    if blocks:
                        content = max(blocks, key=len)
                    
                    content = content.replace(b3, '')
                    content = re.sub(r'^(?:kotlin|java|kt)\b', '', content, flags=re.IGNORECASE).strip()

                    lines = content.split('\n')
                    package_line = ""
                    imports = set()
                    body_lines = []

                    # Gather components
                    for line in lines:
                        stripped = line.strip()
                        if stripped.startswith('package '):
                            if not package_line: package_line = stripped
                        elif stripped.startswith('import '):
                            imports.add(stripped)
                        else:
                            body_lines.append(line)

                    # Strip AI conversational garbage from the top
                    start_idx = 0
                    for i, line in enumerate(body_lines):
                        stripped = line.strip()
                        if not stripped: continue
                        is_valid = False
                        for vs in valid_starts:
                            if stripped.startswith(vs):
                                is_valid = True
                                break
                        if is_valid:
                            start_idx = i
                            break

                    body_lines = body_lines[start_idx:]

                    # Infer package if missing
                    if not package_line:
                        pkg_path = ""
                        if 'java/' in path: pkg_path = path.split('java/')[1]
                        elif 'kotlin/' in path: pkg_path = path.split('kotlin/')[1]
                        if pkg_path:
                            pkg_dir = os.path.dirname(pkg_path)
                            pkg_name = pkg_dir.replace('/', '.').replace('\\', '.')
                            if pkg_name: package_line = f"package {pkg_name}"

                    # Rebuild file strictly
                    final_content = []
                    if package_line:
                        final_content.append(package_line)
                        final_content.append("")
                    for imp in sorted(list(imports)):
                        final_content.append(imp)
                    if imports: final_content.append("")
                    final_content.extend(body_lines)

                    with open(path, 'w', encoding='utf-8') as f_out:
                        f_out.write('\n'.join(final_content))
                except Exception as e:
                    pass
        EOF

    - name: The Room Database Healer
      run: |
        echo "Healing missing Room DB Entities and Converters..."
        python3 - <<'EOF'
        import os

        # 1. Find AppDatabase.kt
        db_path = None
        for root, dirs, files in os.walk('openwave/android/app/src/main/java'):
            if 'AppDatabase.kt' in files:
                db_path = os.path.join(root, 'AppDatabase.kt')
                break

        if db_path:
            db_dir = os.path.dirname(db_path)
            with open(db_path, 'r', encoding='utf-8') as f:
                db_content = f.read()

            # 2. Search for the missing files
            history_pkg = None
            converters_pkg = None

            for root, dirs, files in os.walk('openwave/android/app/src/main/java'):
                for f in files:
                    if f == 'ListeningHistoryEntity.kt':
                        with open(os.path.join(root, f), 'r', encoding='utf-8') as temp_f:
                            for line in temp_f:
                                if line.startswith('package '):
                                    history_pkg = line.replace('package ', '').strip() + '.ListeningHistoryEntity'
                                    break
                    if f == 'Converters.kt':
                        with open(os.path.join(root, f), 'r', encoding='utf-8') as temp_f:
                            for line in temp_f:
                                if line.startswith('package '):
                                    converters_pkg = line.replace('package ', '').strip() + '.Converters'
                                    break

            # 3. Inject imports if files exist elsewhere
            imports_to_add = []
            if history_pkg and history_pkg not in db_content: imports_to_add.append(f"import {history_pkg}")
            if converters_pkg and converters_pkg not in db_content: imports_to_add.append(f"import {converters_pkg}")

            if imports_to_add:
                lines = db_content.split('\n')
                for i, line in enumerate(lines):
                    if line.startswith('package '):
                        lines.insert(i + 1, '\n' + '\n'.join(imports_to_add))
                        break
                with open(db_path, 'w', encoding='utf-8') as f:
                    f.write('\n'.join(lines))
                print("Injected missing imports into AppDatabase.kt")

            # 4. Generate the files if Kimi completely forgot them
            db_pkg = "com.openwave.app.data.local"
            for line in db_content.split('\n'):
                if line.startswith('package '):
                    db_pkg = line.replace('package ', '').strip()
                    break

            if not history_pkg:
                code = f"package {db_pkg}\n\nimport androidx.room.Entity\nimport androidx.room.PrimaryKey\n\n@Entity(tableName = \"listening_history\")\ndata class ListeningHistoryEntity(\n    @PrimaryKey val id: String = \"\",\n    val trackId: String = \"\",\n    val timestamp: Long = 0L\n)\n"
                with open(os.path.join(db_dir, 'ListeningHistoryEntity.kt'), 'w', encoding='utf-8') as f: f.write(code)
                print("Created missing ListeningHistoryEntity.kt")

            if not converters_pkg:
                code = f"package {db_pkg}\n\nimport androidx.room.TypeConverter\n\nclass Converters {{\n    @TypeConverter\n    fun fromString(value: String?): List<String> {{\n        return value?.split(\",\") ?: emptyList()\n    }}\n    @TypeConverter\n    fun toString(list: List<String>?): String {{\n        return list?.joinToString(\",\") ?: \"\"\n    }}\n}}\n"
                with open(os.path.join(db_dir, 'Converters.kt'), 'w', encoding='utf-8') as f: f.write(code)
                print("Created missing Converters.kt")
        EOF

    - name: Build APK
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
