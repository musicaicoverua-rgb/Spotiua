name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run Kimi Commands
      run: |
        tar -xzf OpenWave-Android-Package.tar.gz
        cd OpenWave-Android-Package
        chmod +x build-apk.sh
        ./build-apk.sh

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: '**/*.apk'
        

