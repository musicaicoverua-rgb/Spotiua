name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: STEP 1 - Project Sterilization
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 1. Fix Repositories
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 2. Add Parcelize plugin
        if ! grep -q "kotlin-parcelize" openwave/android/app/build.gradle.kts; then
          sed -i '/id("com.android.application")/a \    id("kotlin-parcelize")' openwave/android/app/build.gradle.kts
        fi
        
        # 3. Inject Dependencies
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        dependencies {
            implementation("androidx.media3:media3-exoplayer:1.3.1")
            implementation("androidx.media3:media3-session:1.3.1")
            implementation("androidx.media3:media3-common:1.3.1")
            implementation("androidx.media3:media3-ui:1.3.1")
            implementation("androidx.media:media:1.7.0")
            implementation("com.jakewharton.timber:timber:5.0.1")
        }
        EOF

    - name: STEP 2 - Resource Surgery (Fixes Unicode Escape Error)
      run: |
        echo "Cleaning problematic XML resources..."
        # Physically delete lines with artist_name and username_optional to prevent build crash
        find . -name "*.xml" -type f -exec sed -i '/artist_name/d' {} +
        find . -name "*.xml" -type f -exec sed -i '/username_optional/d' {} +
        
        # Create fallback missing resources
        RES_DIR="openwave/android/app/src/main/res"
        mkdir -p "$RES_DIR/xml" "$RES_DIR/values" "$RES_DIR/drawable"
        echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">OpenWave</string><string name="playback_channel_name">Music</string><string name="download_channel_name">Downloads</string><style name="Theme.OpenWave" parent="android:Theme.DeviceDefault.NoActionBar"/></resources>' > "$RES_DIR/values/kimi_fixes.xml"
        
        V_XML='<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FFFFFF" android:pathData="M8,5v14l11,-7z"/></vector>'
        for i in play pause previous next ic_download ic_notification ic_launcher; do
            echo "$V_XML" > "$RES_DIR/drawable/${i}.xml"
        done

    - name: STEP 3 - Ultimate Hard Reset (Rewriting Broken AI Files)
      run: |
        python3 - <<'EOF'
        import os, re
        src_dir = 'openwave/android/app/src/main/java'
        base_pkg = "com.openwave.app"
        
        for r, d, f in os.walk(src_dir):
            if 'AppDatabase.kt' in f:
                with open(os.path.join(r, 'AppDatabase.kt'), 'r') as db_f:
                    for line in db_f:
                        if line.startswith('package'):
                            pkg_str = line.replace('package ', '').strip()
                            base_pkg = pkg_str.split('.data')[0] if '.data' in pkg_str else pkg_str.split('.domain')[0]
                            break

        def save(path_list, body):
            full = os.path.join(src_dir, base_pkg.replace('.', '/'), *path_list)
            os.makedirs(os.path.dirname(full), exist_ok=True)
            with open(full, 'w') as f: f.write(body.replace("BASE_PKG", base_pkg))

        # Core Entities & Models
        save(['domain', 'model', 'Track.kt'], "package BASE_PKG.domain.model\nimport android.os.Parcelable\nimport kotlinx.parcelize.Parcelize\n@Parcelize\ndata class Track(val id: String=\"\", val title: String=\"\", val artist: String=\"\", val coverUrl: String=\"\", val streamUrl: String=\"\", val duration: Long=0L) : Parcelable")
        save(['domain', 'model', 'User.kt'], "package BASE_PKG.domain.model\ndata class User(val id: String=\"\", val username: String=\"\")\nenum class ItemType { TRACK, PLAYLIST, ALBUM }")
        save(['data', 'local', 'OfflineDownload.kt'], "package BASE_PKG.data.local\nimport androidx.room.*\nimport android.os.Parcelable\nimport kotlinx.parcelize.Parcelize\n@Parcelize @Entity(tableName=\"offline_downloads\")\ndata class OfflineDownload(@PrimaryKey val id: String, val trackId: String, val filePath: String, val isComplete: Boolean, val progress: Int) : Parcelable")
        save(['data', 'local', 'CachedTrackEntity.kt'], "package BASE_PKG.data.local\nimport androidx.room.*\n@Entity(tableName=\"cached_tracks\")\ndata class CachedTrackEntity(@PrimaryKey val id: String, val title: String=\"\", val artist: String=\"\", val addedAt: Long=0L)")

        # DAOs
        save(['data', 'local', 'OfflineDownloadDao.kt'], "package BASE_PKG.data.local\nimport androidx.room.*\nimport kotlinx.coroutines.flow.Flow\n@Dao\ninterface OfflineDownloadDao {\n @Query(\"SELECT * FROM offline_downloads\")\n fun getAllDownloads(): Flow<List<OfflineDownload>>\n @Insert(onConflict = OnConflictStrategy.REPLACE)\n suspend fun insertDownload(d: OfflineDownload)\n @Query(\"DELETE FROM offline_downloads WHERE trackId = :id\")\n suspend fun deleteDownload(id: String)\n}")
        save(['data', 'local', 'CachedTrackDao.kt'], "package BASE_PKG.data.local\nimport androidx.room.*\nimport kotlinx.coroutines.flow.Flow\n@Dao\ninterface CachedTrackDao {\n @Query(\"SELECT * FROM cached_tracks\")\n fun getAllCachedTracksFlow(): Flow<List<CachedTrackEntity>>\n @Insert(onConflict = OnConflictStrategy.REPLACE)\n suspend fun insertCachedTrack(t: CachedTrackEntity)\n @Query(\"DELETE FROM cached_tracks\")\n suspend fun deleteAllTracks()\n}")

        # Services
        save(['service', 'DownloadService.kt'], "package BASE_PKG.service\nimport android.app.Service\nimport android.content.Intent\nimport android.os.IBinder\nimport androidx.core.app.NotificationCompat\nimport BASE_PKG.R\nclass DownloadService : Service() {\n override fun onBind(i: Intent?): IBinder? = null\n override fun onStartCommand(i: Intent?, f: Int, s: Int): Int {\n  startForeground(1, NotificationCompat.Builder(this, \"dl\").setSmallIcon(R.drawable.ic_notification).setContentTitle(\"Downloading\").build())\n  return START_STICKY\n }\n}")
        save(['service', 'MusicPlaybackService.kt'], "package BASE_PKG.service\nimport android.app.Service\nimport android.content.Intent\nimport android.os.IBinder\nclass MusicPlaybackService : Service() {\n override fun onBind(i: Intent?): IBinder? = null\n}")
        EOF

    - name: STEP 4 - AppDatabase Stabilizer (Safe Mode)
      run: |
        python3 - <<'EOF'
        import os, re
        src = 'openwave/android/app/src/main/java'
        db_file = next((os.path.join(r, 'AppDatabase.kt') for r, d, f in os.walk(src) if 'AppDatabase.kt' in f), None)
        
        if db_file:
            with open(db_file, 'r') as f: content = f.read()
            pkg = re.search(r'^package\s+(.*)', content, re.M).group(1).strip()
            
            # Sync Entity names
            content = content.replace('OfflineDownloadEntity', 'OfflineDownload')
            content = content.replace('CachedTrack', 'CachedTrackEntity')
            
            entities = re.findall(r'(\w+)::class', content)
            daos = re.findall(r'abstract\s+fun\s+\w+\s*\(\s*\)\s*:\s*(\w+)', content)
            
            existing = set()
            for r, d, files in os.walk(src):
                for f in files: existing.add(f.replace('.kt', ''))
            
            # Create missing stubs
            for name in entities:
                if name not in existing:
                    with open(os.path.join(os.path.dirname(db_file), name + ".kt"), 'w') as out:
                        out.write("package " + pkg + "\nimport androidx.room.*\n@Entity\ndata class " + name + "(@PrimaryKey val id: String = \"\")\n")
                    existing.add(name)
            
            for name in daos:
                if name not in existing:
                    with open(os.path.join(os.path.dirname(db_file), name + ".kt"), 'w') as out:
                        out.write("package " + pkg + "\nimport androidx.room.*\n@Dao\ninterface " + name + " {}\n")
                    existing.add(name)
            
            # Clean imports
            lines = content.split('\n')
            final_lines = [l for l in lines if 'OfflineDownloadEntity' not in l]
            with open(db_file, 'w') as f: f.write('\n'.join(final_lines))
        EOF

    - name: STEP 5 - Final Build
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: STEP 6 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-Final-Build
        path: '**/*.apk'
