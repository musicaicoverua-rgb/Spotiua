name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Fix Kotlin Conflict
      run: |
        mkdir -p ~/.gradle
        cat << 'EOF' > ~/.gradle/init.gradle
        allprojects {
            configurations.all {
                resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                    if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.startsWith('kotlin-stdlib')) {
                        details.useVersion '1.8.22'
                    }
                }
            }
        }
        EOF

    - name: Patch and Build
      run: |
        # 1. Розпаковуємо ваш архів
        unzip "Kimi_Agent_OpenWave Admin Email Config.zip"
        
        # 2. ШУКАЄМО ФАЙЛ useTracks.ts І ВНОСИМО ПРАВКИ (Адмін + Релоад)
        TARGET_FILE=$(find . -name useTracks.ts | head -n 1)
        
        cat << 'EOF' > patch.py
        import sys
        content = open(sys.argv[1]).read()
        
        # Додаємо перевірку вашої пошти
        admin_check = """
            const { data: { user: adminUser } } = await supabase.auth.getUser()
            if (!adminUser || adminUser.email !== 'andriimykolyshyn@gmail.com') {
                throw new Error('Доступ дозволено тільки адміністратору Андрію')
            }
        """
        content = content.replace(
            "const { data: { user } } = await supabase.auth.getUser()", 
            "const { data: { user } } = await supabase.auth.getUser()" + admin_check
        )
        
        # Додаємо автоматичне оновлення сторінки
        content = content.replace(
            "return data", 
            "setTimeout(() => { window.location.href = '/' }, 1500); return data"
        )
        
        with open(sys.argv[1], 'w') as f:
            f.write(content)
        EOF
        
        python3 patch.py "$TARGET_FILE"

        # 3. ЗАПУСКАЄМО САМУ ЗБІРКУ
        SCRIPT_DIR=$(dirname $(find . -name build-apk.sh | head -n 1))
        cd "$SCRIPT_DIR"
        chmod +x build-apk.sh
        ./build-apk.sh

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Final-Admin-Version
        path: '**/*.apk'
