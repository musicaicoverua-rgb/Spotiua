name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Flutter (Upgraded to 3.24.3)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'

    - name: STEP 1 - Unpack Kimi's Project
      run: |
        unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
        FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
        echo "Знайдено проект Flutter у папці: $FLUTTER_DIR"
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: STEP 2 - Surgical Android Wrapper Regeneration
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        echo "1. Зберігаємо Маніфест (права на аудіо) та іконки..."
        mkdir -p /tmp/openwave_backup/res
        cp android/app/src/main/AndroidManifest.xml /tmp/openwave_backup/AndroidManifest.xml || true
        cp -r android/app/src/main/res/* /tmp/openwave_backup/res/ || true
        
        echo "2. Видаляємо стару конфігурацію..."
        rm -rf android/
        
        echo "3. Генеруємо ідеальну структуру для найновішого Flutter 3.24.3..."
        flutter create . --platforms android
        
        echo "4. Повертаємо Маніфест та іконки на місце..."
        cp /tmp/openwave_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml || true
        cp -r /tmp/openwave_backup/res/* android/app/src/main/res/ || true

    - name: STEP 3 - Fix Dependencies & Generate Code
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        # Оновлюємо конфліктні пакети до найновіших версій, які тепер ідеально підходять
        flutter pub add intl:any package_info_plus:any device_info_plus:any share_plus:any connectivity_plus:any
        
        flutter pub get
        
        # Генеруємо код для бази даних (Drift) та ін'єкцій
        dart run build_runner build --delete-conflicting-outputs || true

    - name: STEP 4 - Build Production APK
      run: |
        cd ${{ env.FLUTTER_DIR }}
        # Збираємо готовий додаток
        flutter build apk --debug

    - name: STEP 5 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-Full-App
        path: "**/build/app/outputs/flutter-apk/*.apk"
