name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Inject Gradle Hook and Fix Settings
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        tasks.matching { it.name.startsWith("merge") && it.name.endsWith("Resources") }.configureEach {
            doFirst {
                val uStr = 92.toChar() + "u{str}"
                val regArtist = Regex("<string name=\"artist_name\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                val regUser = Regex("<string name=\"username_optional\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                
                fun sanitizeDir(dir: File) {
                    if (dir.exists()) {
                        dir.walkTopDown().filter { it.name.endsWith(".xml") }.forEach { file ->
                            try {
                                var text = file.readText()
                                var changed = false
                                if (text.contains("artist_name")) { text = text.replace(regArtist, ""); changed = true }
                                if (text.contains("username_optional")) { text = text.replace(regUser, ""); changed = true }
                                if (text.contains(uStr)) { text = text.replace(uStr, "str"); changed = true }
                                if (changed) { file.writeText(text) }
                            } catch(e: Exception) {}
                        }
                    }
                }
                sanitizeDir(File(System.getProperty("user.home"), ".gradle/caches/transforms-3"))
                sanitizeDir(File(projectDir, "src/main/res"))
            }
        }
        EOF

    - name: Generator of Missing LLM Resources
      run: |
        RES_DIR="openwave/android/app/src/main/res"
        mkdir -p "$RES_DIR/xml" "$RES_DIR/values" "$RES_DIR/mipmap-anydpi-v26"
        
        echo '<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup><exclude domain="sharedpref" path="."/></cloud-backup></data-extraction-rules>' > "$RES_DIR/xml/data_extraction_rules.xml"
        echo '<?xml version="1.0" encoding="utf-8"?><full-backup-content><exclude domain="sharedpref" path="."/></full-backup-content>' > "$RES_DIR/xml/backup_rules.xml"
        
        echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">OpenWave</string></resources>' > "$RES_DIR/values/kimi_missing_strings.xml"
        echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.OpenWave" parent="android:Theme.DeviceDefault.NoActionBar"/></resources>' > "$RES_DIR/values/kimi_missing_themes.xml"
        
        cat << 'EOF' > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="[http://schemas.android.com/apk/res/android](http://schemas.android.com/apk/res/android)" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#1DB954" android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF
        cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"

