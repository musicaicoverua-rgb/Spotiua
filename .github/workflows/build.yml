name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Flutter (Upgraded to 3.24.3)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'

    - name: STEP 1 - Unpack Kimi's Project
      run: |
        unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
        FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
        echo "Знайдено проект Flutter у папці: $FLUTTER_DIR"
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: STEP 2 - Hardcode Dependency Fixes
      run: |
        cd ${{ env.FLUTTER_DIR }}
        echo "Жорстко переписуємо версії в pubspec.yaml перед запуском Flutter..."
        
        # Замінюємо старі версії на 'any'
        sed -i 's/intl:.*/intl: ^0.19.0/g' pubspec.yaml
        sed -i 's/package_info_plus:.*/package_info_plus: any/g' pubspec.yaml
        sed -i 's/device_info_plus:.*/device_info_plus: any/g' pubspec.yaml
        sed -i 's/connectivity_plus:.*/connectivity_plus: any/g' pubspec.yaml
        sed -i 's/share_plus:.*/share_plus: any/g' pubspec.yaml
        sed -i 's/supabase_flutter:.*/supabase_flutter: any/g' pubspec.yaml

    - name: STEP 3 - Surgical Android Wrapper Regeneration
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        echo "1. Зберігаємо Маніфест (права на аудіо) та іконки..."
        mkdir -p /tmp/openwave_backup/res
        cp android/app/src/main/AndroidManifest.xml /tmp/openwave_backup/AndroidManifest.xml || true
        cp -r android/app/src/main/res/* /tmp/openwave_backup/res/ || true
        
        echo "2. Видаляємо стару конфігурацію..."
        rm -rf android/
        
        echo "3. Генеруємо ідеальну структуру (БЕЗ автоматичного завантаження пакетів)..."
        flutter create --no-pub . --platforms android
        
        echo "4. Повертаємо Маніфест та іконки на місце..."
        cp /tmp/openwave_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml || true
        cp -r /tmp/openwave_backup/res/* android/app/src/main/res/ || true

    - name: STEP 4 - Pub Get & Generate Code
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        echo "Завантажуємо оновлені пакети..."
        flutter pub get
        
        echo "Генеруємо код для бази даних..."
        dart run build_runner build --delete-conflicting-outputs || true

    - name: STEP 5 - Build Production APK (With Legacy Plugin Fix)
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        # МАГІЧНИЙ ФІКС: Штучно додаємо версії SDK для старих плагінів
        echo "Ін'єкція параметрів SDK у local.properties..."
        mkdir -p android
        echo "flutter.compileSdkVersion=34" >> android/local.properties
        echo "flutter.minSdkVersion=24" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties
        
        echo "Збираємо APK..."
        flutter build apk --debug

    - name: STEP 6 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-Full-App
        path: "**/build/app/outputs/flutter-apk/*.apk"
