name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Correct Gradle Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare and Patch Android Project
      run: |
        # 1. Розпаковуємо архів
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 2. Виправлення дублікатів репозиторіїв та мов
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 3. ВИПРАВЛЕННЯ БАГУ GOOGLE (Понижуємо media3 до стабільної 1.1.1)
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        configurations.all {
            resolutionStrategy.eachDependency {
                if (requested.group == "androidx.media3") {
                    useVersion("1.1.1")
                }
            }
        }
        EOF
        
        # 4. ЖОРСТКА ЗАЧИСТКА: Видаляємо всі рядки з помилками Kimi
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/\\u/d' {} +
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/{str}/d' {} +
        find openwave/android/app/src/main/res -name "*.xml" -type f -exec sed -i '/username_optional/d' {} +

    - name: Build Native Android App
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Spotiua-Native-Final
        path: '**/*.apk'
        
