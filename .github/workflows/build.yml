name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Project Sterilization and Dependency Injection
      run: |
        unzip "Kimi_Agent_OpenWave Native Music App.zip"
        
        # 1. Standardize Repository management (Fixes 'FAIL_ON_PROJECT_REPOS')
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' openwave/android/settings.gradle.kts
        sed -i '/resourceConfigurations/d' openwave/android/app/build.gradle.kts
        
        # 2. Inject Parcelize plugin for stable data transfer
        if ! grep -q "kotlin-parcelize" openwave/android/app/build.gradle.kts; then
          sed -i '/id("com.android.application")/a \    id("kotlin-parcelize")' openwave/android/app/build.gradle.kts
        fi
        
        # 3. Inject missing library dependencies and XML Scrubber Hook (Fixes '\u{str}')
        cat << 'EOF' >> openwave/android/app/build.gradle.kts
        
        dependencies {
            implementation("androidx.media3:media3-exoplayer:1.3.1")
            implementation("androidx.media3:media3-session:1.3.1")
            implementation("androidx.media3:media3-common:1.3.1")
            implementation("androidx.media3:media3-ui:1.3.1")
            implementation("androidx.media:media:1.7.0")
            implementation("com.jakewharton.timber:timber:5.0.1")
        }
        
        tasks.matching { it.name.startsWith("merge") && it.name.endsWith("Resources") }.configureEach {
            doFirst {
                val uStr = 92.toChar() + "u{str}"
                val regArt = Regex("<string name=\"artist_name\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                val regUsr = Regex("<string name=\"username_optional\".*?</string>", RegexOption.DOT_MATCHES_ALL)
                
                fun sanitizeDir(dir: File) {
                    if (dir.exists()) {
                        dir.walkTopDown().filter { it.name.endsWith(".xml") }.forEach { f ->
                            try {
                                var txt = f.readText()
                                var changed = false
                                if (txt.contains("artist_name")) { txt = txt.replace(regArt, ""); changed = true }
                                if (txt.contains("username_optional")) { txt = txt.replace(regUsr, ""); changed = true }
                                if (txt.contains(uStr)) { txt = txt.replace(uStr, "str"); changed = true }
                                if (changed) { f.writeText(txt) }
                            } catch(e: Exception) {}
                        }
                    }
                }
                sanitizeDir(File(System.getProperty("user.home"), ".gradle/caches/transforms-3"))
                sanitizeDir(File(projectDir, "src/main/res"))
            }
        }
        EOF

    - name: UI Asset and String Resources Generator
      run: |
        echo "Creating missing icons and localized strings..."
        RES_DIR="openwave/android/app/src/main/res"
        mkdir -p "$RES_DIR/xml" "$RES_DIR/values" "$RES_DIR/mipmap-anydpi-v26" "$RES_DIR/drawable"
        
        # Backup rules
        echo '<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup><exclude domain="sharedpref" path="."/></cloud-backup></data-extraction-rules>' > "$RES_DIR/xml/data_extraction_rules.xml"
        echo '<?xml version="1.0" encoding="utf-8"?><full-backup-content><exclude domain="sharedpref" path="."/></full-backup-content>' > "$RES_DIR/xml/backup_rules.xml"
        
        # UI Strings (App name, Player channels, buttons)
        cat << 'EOF' > "$RES_DIR/values/kimi_missing_strings.xml"
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">OpenWave</string>
            <string name="playback_channel_name">Music Playback</string>
            <string name="playback_channel_description">Notifications for audio playback</string>
            <string name="downloading_track">Downloading...</string>
            <string name="download_complete">Downloaded</string>
            <string name="download_failed">Error</string>
            <string name="previous">Back</string>
            <string name="pause">Pause</string>
            <string name="play">Play</string>
            <string name="next">Next</string>
        </resources>
        EOF
        echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.OpenWave" parent="android:Theme.DeviceDefault.NoActionBar"/></resources>' > "$RES_DIR/values/kimi_missing_themes.xml"
        
        # Drawables (Placeholders for media buttons)
        V_XML='<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FFFFFF" android:pathData="M8,5v14l11,-7z"/></vector>'
        for i in play pause previous next ic_download ic_download_complete ic_download_error ic_notification ic_previous ic_pause ic_play ic_next; do
            echo "$V_XML" > "$RES_DIR/drawable/${i}.xml"
        done
        
        # Launcher Icon
        echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#1DB954" android:pathData="M0,0h108v108h-108z"/></vector>' > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
        cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"

    - name: Intelligent Kotlin Surgeon (Advanced Concatenation and Repair)
      run: |
        echo "Performing deep structural repair and intelligent block merging..."
        python3 - <<'EOF'
        import os, re

        valid_starts = ('package ', 'import ', '@', 'class ', 'interface ', 'object ', 'fun ', 'val ', 'var ', 'typealias ', 'public ', 'private ', 'protected ', 'internal ', 'expect ', 'actual ', 'final ', 'open ', 'abstract ', 'sealed ', 'const ', 'external ', 'override ', 'lateinit ', 'tailrec ', 'vararg ', 'suspend ', 'inner ', 'enum ', 'annotation ', 'companion ', 'inline ', 'noinline ', 'crossinline ', 'reified ', 'infix ', 'operator ', 'data ')

        for root, dirs, files in os.walk('openwave/android/app/src/main/java'):
            for f in files:
                if not (f.endswith('.kt') or f.endswith('.java')): continue
                path = os.path.join(root, f)

                try:
                    with open(path, 'r', encoding='utf-8') as file: content = file.read()
                    
                    # 1. Extract and GLUE all blocks (Fixes fragmented classes)
                    b3 = chr(96) * 3
                    pattern = b3 + r'(?:kotlin|java|kt)?\n?(.*?)' + b3
                    blocks = re.findall(pattern, content, re.DOTALL | re.IGNORECASE)
                    if blocks:
                        # Clean each block from the language name if LLM included it inside the block
                        content = '\n\n'.join([re.sub(r'^\s*(?:kotlin|java|kt)\b', '', b, flags=re.IGNORECASE).strip() for b in blocks if len(b.strip()) > 5])
                    
                    content = content.replace(b3, '').strip()

                    # 2. Reconstruct structure: remove duplicate package/imports from inner blocks
                    lines = content.split('\n')
                    clean_lines = []
                    pkg = ""
                    imports = set()
                    
                    for line in lines:
                        s = line.strip()
                        if s.startswith('package '): 
                            if not pkg: pkg = s
                        elif s.startswith('import '):
                            imports.add(s)
                        else:
                            clean_lines.append(line)

                    # 3. Strip leading English chatter from LLM
                    start_idx = 0
                    for i, line in enumerate(clean_lines):
                        if any(line.strip().startswith(v) for v in valid_starts):
                            start_idx = i
                            break
                    clean_lines = clean_lines[start_idx:]
                    
                    body = '\n'.join(clean_lines)

                    # 4. FIX SYNTAX: Remove trailing commas in signatures (Fixes 'Parameter name expected')
                    body = re.sub(r',\s*\)', ')', body)
                    body = re.sub(r',\s*\}', '}', body)
                    
                    # 5. Global Entity and Type Repair
                    body = re.sub(r'\bOfflineDownloadEntity\b', 'OfflineDownload', body)

                    # 6. Automatic Parcelize support for Downloads and Tracking
                    if 'data class OfflineDownload' in body:
                        imports.add('import kotlinx.parcelize.Parcelize')
                        imports.add('import android.os.Parcelable')
                        imports.add('import androidx.room.Entity')
                        imports.add('import androidx.room.PrimaryKey')
                        body = re.sub(r'data class OfflineDownload\s*\(', r'@Parcelize\n@Entity(tableName="offline_downloads")\ndata class OfflineDownload(', body)
                        body = re.sub(r'(data class OfflineDownload\s*\([^)]*\))', r'\1 : Parcelable', body)
                        if '@PrimaryKey' not in body:
                            body = re.sub(r'(val\s+[a-zA-Z0-9_]+\s*:)', r'@PrimaryKey \1', body, count=1)

                    # Infer package name from folder structure if missing
                    if not pkg:
                        p_parts = path.split('java/')[1] if 'java/' in path else path.split('kotlin/')[1]
                        pkg = "package " + os.path.dirname(p_parts).replace('/', '.').replace('\\', '.')

                    # Re-assemble the file perfectly
                    final_file = [pkg, ""] + sorted(list(imports)) + ["", body]
                    with open(path, 'w', encoding='utf-8') as f_out:
                        f_out.write('\n'.join(final_file))
                except Exception: pass
        EOF

    - name: Room Database Stub Healer
      run: |
        echo "Generating missing Room DB entities to ensure compilation..."
        python3 - <<'EOF'
        import os, re
        src = 'openwave/android/app/src/main/java'
        existing_classes = set()
        for r, d, files in os.walk(src):
            for f in files:
                if f.endswith('.kt'):
                    try:
                        with open(os.path.join(r, f), 'r') as k:
                            for m in re.finditer(r'(?:class|interface)\s+([a-zA-Z0-9_]+)', k.read()):
                                existing_classes.add(m.group(1))
                    except: pass
        
        db_file = None
        for r, d, files in os.walk(src):
            if 'AppDatabase.kt' in files:
                db_file = os.path.join(r, 'AppDatabase.kt')
                break
        
        if db_file:
            with open(db_file, 'r') as f: content = f.read()
            pkg_match = re.search(r'^package\s+(.*)', content, re.M)
            if pkg_match:
                pkg = pkg_match.group(1).strip()
                def add_missing(regex, typ):
                    m = re.search(regex, content, re.S)
                    if m:
                        for item in m.group(1).split(','):
                            name = re.sub(r'::class.*|\.class', '', item).strip()
                            if '.' in name: name = name.split('.')[-1]
                            if name and name not in existing_classes:
                                with open(os.path.join(os.path.dirname(db_file), f"{name}.kt"), 'w') as out:
                                    out.write(f"package {pkg}\nimport androidx.room.*\n")
                                    if typ == 'e': out.write(f"@Entity\ndata class {name}(@PrimaryKey val id: String = \"\")\n")
                                    else: out.write(f"class {name} {{ @TypeConverter fun f(v:String?):List<String> = emptyList() }}\n")
                add_missing(r'entities\s*=\s*[\[\{](.*?)[\]\}]', 'e')
                add_missing(r'@TypeConverters\s*\(\s*(?:value\s*=\s*)?[\[\{]?(.*?)[\]\}]?\s*\)', 'c')
        EOF

    - name: Final Build Push
      run: |
        cd openwave/android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-Alpha-Build
        path: '**/*.apk'
