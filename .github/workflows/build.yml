name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0' # ОНОВЛЕНО: Тепер підтримує всі нові бібліотеки Kimi
        channel: 'stable'

    - name: STEP 1 - Unpack Kimi's Project
      run: |
        # Розпаковуємо архів
        unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
        
        # Автоматично знаходимо папку, де лежить pubspec.yaml
        FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
        echo "Знайдено проект Flutter у папці: $FLUTTER_DIR"
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: STEP 2 - Get Packages & Generate Code
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        # Завантажуємо всі бібліотеки
        flutter pub get
        
        # Kimi використовує розумну архітектуру, яка потребує генерації коду. 
        # Використовуємо сучасну команду dart run
        dart run build_runner build --delete-conflicting-outputs || true

    - name: STEP 3 - Build Production APK
      run: |
        cd ${{ env.FLUTTER_DIR }}
        # Збираємо додаток
        flutter build apk --debug

    - name: STEP 4 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-Full-App
        path: "**/build/app/outputs/flutter-apk/*.apk"
