name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Using the latest Flutter 3.24.3
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'

    - name: STEP 1 - Unpack Project
      run: |
        unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
        FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
        echo "Found Flutter project in directory: $FLUTTER_DIR"
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: STEP 2 - The Ultimate Dependency Upgrade
      run: |
        cd ${{ env.FLUTTER_DIR }}
        echo "Updating libraries to modern 2024 standards..."
        
        # THE MAIN FIX: Update Supabase to avoid pulling the legacy app_links plugin
        sed -i 's/supabase_flutter:.*/supabase_flutter: ^2.6.0/g' pubspec.yaml
        
        # Update other problematic plugins
        sed -i 's/intl:.*/intl: ^0.19.0/g' pubspec.yaml
        sed -i 's/package_info_plus:.*/package_info_plus: ^8.0.0/g' pubspec.yaml
        sed -i 's/device_info_plus:.*/device_info_plus: ^10.1.0/g' pubspec.yaml
        sed -i 's/connectivity_plus:.*/connectivity_plus: ^6.0.4/g' pubspec.yaml
        sed -i 's/share_plus:.*/share_plus: ^9.0.0/g' pubspec.yaml

    - name: STEP 3 - Clean Android Wrapper Generation
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        echo "1. Backing up the original Manifest (with audio permissions)..."
        mkdir -p /tmp/openwave_backup/res
        cp android/app/src/main/AndroidManifest.xml /tmp/openwave_backup/AndroidManifest.xml || true
        cp -r android/app/src/main/res/* /tmp/openwave_backup/res/ || true
        
        echo "2. Removing the old broken Android configuration..."
        rm -rf android/
        
        echo "3. Creating a modern clean structure..."
        flutter create --no-pub --platforms android .
        
        echo "4. Restoring the Manifest and resources..."
        cp /tmp/openwave_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml || true
        cp -r /tmp/openwave_backup/res/* android/app/src/main/res/ || true

    - name: STEP 4 - Pub Get & Generate Code
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter pub get
        dart run build_runner build --delete-conflicting-outputs || true

    - name: STEP 5 - Build Production APK
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter build apk --debug

    - name: STEP 6 - Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-App-Ready
        path: "**/build/app/outputs/flutter-apk/*.apk"
